# Online Players - generated catalog menu of online players with admin actions
# Docs: https://abstractmenus.github.io/docs/en/examples/admin-tools/online-players
# Open: /ame_online
# Requires: -

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Online Players (page %page% / %pages_count%)"
size: 6

# Restrict access - admins only.
rules: ${rulesAdmin}

activators {
  command: "ame_online"
}

# Pull online players as catalog entries. Each entry exposes %ctg_player_*% placeholders.
catalog {
  type: PLAYERS
}

# 7-wide grid of player heads with borders. 4 rows of 7 = 28 heads per page.
matrix {
  cells: [
    "_________"
    "_xxxxxxx_"
    "_xxxxxxx_"
    "_xxxxxxx_"
    "_xxxxxxx_"
    "_________"
  ]

  templates {
    "x" {
      material: PLAYER_HEAD
      skullOwner: "%ctg_player_name%"
      name: "&e%ctg_player_name%"
      lore: [
        "&7Health: &c%ctg_player_health%"
        "&7World: &b%ctg_player_world%"
        ""
        "&aLeft-click  - teleport to player"
        "&cShift-click - kick player"
      ]
      click {
        left {
          actions {
            command {
              console: "tp %player_name% %ctg_player_name%"
            }
            sound: ${clickSound}
            closeMenu: true
          }
        }
        shift_left {
          actions {
            command {
              console: "kick %ctg_player_name% &cKicked by an admin"
            }
            sound: ${successSound}
            refreshMenu: true
            message: "&aKicked &e%ctg_player_name%"
          }
        }
      }
    }
  }
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "45-53" }

  # Pagination buttons - shown only when there are multiple pages.
  ${buttonPrev} { slot: 48 }
  ${buttonNext} { slot: 50 }

  # Page counter (info-only)
  {
    slot: 49
    material: PAPER
    name: "&ePage %page% / %pages_count%"
    lore: ["&7Total online: &e%pages_total%"]
  }

  ${buttonClose} { slot: 53 }
]
