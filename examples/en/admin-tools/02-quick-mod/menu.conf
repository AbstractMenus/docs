# Quick Mod - admin-only menu of common moderation commands
# Docs: https://abstractmenus.github.io/docs/en/examples/admin-tools/quick-mod
# Open: /ame_mod  (admin only)
# Requires: any plugin that provides /kick /ban /mute /gamemode

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&cQuick Mod Tools"
size: 3

# Menu-level access gate - non-admins can't even open this menu.
rules: ${rulesAdmin}

activators {
  command: "ame_mod"
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  {
    slot: 4
    material: NETHER_STAR
    name: "&c&lQuick Mod Tools"
    lore: ["&7Common moderation actions.", "&8Admin-only."]
  }

  # ========== Game mode shortcuts ==========
  {
    slot: 10
    material: GRASS_BLOCK
    name: "&aSet Survival"
    lore: ["&7Switch yourself to survival mode."]
    click {
      actions {
        setGamemode: "SURVIVAL"
        sound: ${clickSound}
        message: "&aGamemode: SURVIVAL"
      }
    }
  }
  {
    slot: 11
    material: DIAMOND_PICKAXE
    name: "&aSet Creative"
    flags: HIDE_ATTRIBUTES
    lore: ["&7Switch yourself to creative mode."]
    click {
      actions {
        setGamemode: "CREATIVE"
        sound: ${clickSound}
        message: "&aGamemode: CREATIVE"
      }
    }
  }
  {
    slot: 12
    material: ENDER_EYE
    name: "&aSet Spectator"
    lore: ["&7Switch yourself to spectator mode."]
    click {
      actions {
        setGamemode: "SPECTATOR"
        sound: ${clickSound}
        message: "&aGamemode: SPECTATOR"
      }
    }
  }

  # ========== Player browser ==========
  {
    slot: 14
    material: PLAYER_HEAD
    name: "&aBrowse online players"
    lore: ["&7Open the online players menu", "&7for kick / teleport actions."]
    click { openMenu: "ame_online" }
  }

  # ========== Server actions ==========
  {
    slot: 15
    material: TNT
    name: "&cBroadcast: server restart"
    lore: ["&7Send a chat-wide warning."]
    click {
      actions {
        broadcast: "&c[Admin] &fServer restart in 5 minutes. Save your work."
        sound: ${successSound}
      }
    }
  }
  {
    slot: 16
    material: COMPASS
    name: "&aTeleport to spawn"
    lore: ["&7Run /spawn for yourself."]
    click {
      actions {
        command {
          player: "spawn"
        }
        sound: ${clickSound}
        closeMenu: true
      }
    }
  }

  ${buttonClose} { slot: 22 }
]
