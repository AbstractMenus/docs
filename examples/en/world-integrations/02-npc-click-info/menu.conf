# NPC Click Info - info menu about a Citizens NPC the player clicked
# Docs: https://abstractmenus.github.io/docs/en/examples/world-integrations/npc-click-info
# Open: right-click any Citizens NPC with id 1, 2, or 3
# Requires: Citizens

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6NPC: %activator_npc_name%"
size: 3

activators {
  clickNPC: [1, 2, 3]
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # Header pulls from NPC context
  {
    slot: 4
    material: PLAYER_HEAD
    skullOwner: "%activator_npc_name%"
    name: "&6%activator_npc_name%"
    lore: [
      "&7Citizens NPC #&f%activator_npc_id%"
      "&7World: &f%activator_npc_world%"
      ""
      "&7Click any tile below for an action."
    ]
  }

  # Generic actions any NPC click can offer
  {
    slot: 11
    material: PAPER
    name: "&aGreet"
    lore: ["&7Make this NPC say hi."]
    click {
      actions {
        message: "&e[%activator_npc_name%] &fHello, %player_name%!"
        sound: ${clickSound}
      }
    }
  }
  {
    slot: 13
    material: COMPASS
    name: "&aShow location"
    lore: ["&7Print this NPC's coordinates."]
    click {
      actions {
        message: "&e[%activator_npc_name%] &fI'm in %activator_npc_world% at NPC id %activator_npc_id%."
        sound: ${clickSound}
      }
    }
  }
  {
    slot: 15
    material: EMERALD
    name: "&aTalk to vendor"
    lore: ["&7Open this NPC's shop, if it has one."]
    click {
      actions {
        # In a real setup you'd route specific NPCs to specific shop menus.
        # The demo just opens the generic vendor shop.
        openMenu: "ame_shop"
      }
    }
  }

  ${buttonClose} { slot: 22 }
]
