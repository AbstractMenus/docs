# Region Welcome - greet players who enter a WorldGuard region
# Docs: https://abstractmenus.github.io/docs/en/examples/world-integrations/region-welcome
# Open: automatically on entering region "spawn"
# Requires: WorldGuard

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Welcome to Spawn"
size: 3

activators {
  regionJoin: ["spawn"]
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # Welcome banner
  {
    slot: 4
    material: NETHER_STAR
    name: "&6&lWelcome to MyTestServer"
    lore: [
      "&7You've entered the &fSpawn&7 region."
      ""
      "&7Pick up where you left off."
    ]
  }

  # Quick links
  {
    slot: 11
    material: COMPASS
    name: "&aOpen the main hub"
    lore: ["&7Browse all available menus."]
    click {
      openMenu: "ame_hub"
    }
  }
  {
    slot: 13
    material: WRITTEN_BOOK
    name: "&aServer rules"
    lore: ["&7Read the rules before playing."]
    click {
      openMenu: "ame_rules"
    }
  }
  {
    slot: 15
    material: CHEST
    name: "&aGet your starter kit"
    lore: ["&7Free items for new players."]
    click {
      openMenu: "ame_kit"
    }
  }

  ${buttonClose} { slot: 22 }
]
