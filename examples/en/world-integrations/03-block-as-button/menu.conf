# Block-as-Button - clickBlockType activator opens menu when player clicks a material
# Docs: https://abstractmenus.github.io/docs/en/examples/world-integrations/block-as-button
# Open: right-click any DIAMOND_BLOCK in the world
# Requires: -

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&bDiamond Block clicked at %activator_block_x%, %activator_block_y%, %activator_block_z%"
size: 1

activators {
  clickBlockType: ["DIAMOND_BLOCK"]
}

items: [
  {
    slot: 4
    material: DIAMOND
    name: "&bWelcome"
    lore: [
      "&7You clicked a diamond block in"
      "&7world &f%activator_block_world%&7."
      ""
      "&7Activator placeholders give you the"
      "&7clicked block's coords, world, type, etc."
    ]
  }
  ${buttonClose} { slot: 8 }
]
