# Item Enhancer - drag-and-drop with conditional transformation via oneof rule
# Docs: https://abstractmenus.github.io/docs/en/examples/state-and-vars/item-enhancer
# Open: /ame_enhancer
# Requires: -

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Item Enhancer"
size: 1

activators {
  command: "ame_enhancer"
}

# Slots 2 (input) and 6 (result) are draggable. Slot 4 is the trigger button.
draggable: [
  "--x---x--"
]

# Result-slot placeholder shown when the menu opens or the input is invalid.
resultStub {
  slot: 6
  material: WHITE_STAINED_GLASS_PANE
  name: "&7Result"
}

# Reusable bits
inputSlotRule { slot: 2 }
outputAction  { slot: 6, count: "%changed_item_amount%" }

# The transformation table: each entry pairs a "placed input matches X" rule
# with an action that produces output Y. `oneof` short-circuits on the first
# match - so the first matching transformation wins.
enhanceRules {
  oneof: [
    {
      placedItem: ${inputSlotRule} { material: STONE }
      actions { placeItem: ${outputAction} { material: COAL_ORE } }
    }
    {
      placedItem: ${inputSlotRule} { material: APPLE }
      actions { placeItem: ${outputAction} { material: GOLDEN_APPLE } }
    }
    {
      placedItem: ${inputSlotRule} { material: WOODEN_SWORD }
      actions { placeItem: ${outputAction} { material: DIAMOND_SWORD } }
    }
    {
      placedItem: ${inputSlotRule} { material: WOODEN_AXE }
      actions { placeItem: ${outputAction} { material: DIAMOND_AXE } }
    }
  ]
}

items: [
  # Decorative panes around the draggable slots
  {
    slot: [ "xx-x-x-x-" ]
    material: BLACK_STAINED_GLASS_PANE
    name: " "
  }

  # Default result-slot placeholder
  ${resultStub}

  # Recipes info card
  {
    slot: 8
    material: NAME_TAG
    name: "&aRecipes"
    lore: [
      "&fStone &7-> &bCoal Ore"
      "&fApple &7-> &bGolden Apple"
      "&fWooden Sword &7-> &bDiamond Sword"
      "&fWooden Axe &7-> &bDiamond Axe"
    ]
  }

  # The "Enhance!" button
  {
    slot: 4
    material: NETHER_STAR
    name: "&bEnhance!"
    click {
      rules: ${enhanceRules}
      actions {
        removePlaced: 2
        sound: ${successSound}
      }
      denyActions {
        rules {
          placedItem { slot: 6, material: AIR }
        }
        actions {
          setButton: ${resultStub}
          sound: ${deniedSound}
        }
      }
    }
  }
]
