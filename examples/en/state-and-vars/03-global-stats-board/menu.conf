# Global Stats Board - live display of player and server stats
# Docs: https://abstractmenus.github.io/docs/en/examples/state-and-vars/global-stats-board
# Open: /ame_stats
# Requires: PlaceholderAPI + statistic expansion

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6&l%player_name%'s Stats"
size: 4
updateInterval: 20

activators {
  command: "ame_stats"
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "27-35" }

  # ========== Player section (row 1) ==========
  {
    slot: 10
    texture: "ebfe9b7af68dc1264a6fc969f3d7b08e50e61e6ee91cea83daabd18820f0ef"
    name: "&6Player Kills"
    lore: ["", "&e%statistic_player_kills%"]
  }
  {
    slot: 12
    texture: "1ae3855f952cd4a03c148a946e3f812a5955ad35cbcb52627ea4acd47d3081"
    name: "&6Deaths"
    lore: ["", "&c%statistic_deaths%"]
  }
  {
    slot: 14
    texture: "f67b27fb7e29ec98e1cd4a8f8466856d9ef3f2e9fbd9aed6311f8abe54b6ab2"
    name: "&6Mob Kills"
    lore: ["", "&e%statistic_mob_kills%"]
  }
  {
    slot: 16
    texture: "f32c6171532a2a87f0eeb28edd010833f33f0ae6841a524e1b5200a35d385050"
    name: "&6Hours Played"
    lore: ["", "&e%statistic_hours_played%h"]
  }

  # ========== Server section (row 2) ==========
  {
    slot: 19
    material: BEACON
    name: "&aOnline Now"
    lore: ["", "&e%server_online%&7 / &e%server_max_players%"]
  }
  {
    slot: 21
    material: CLOCK
    name: "&aServer Time"
    lore: ["", "&e%server_time_HH:mm:ss%"]
  }
  {
    slot: 23
    material: ENDER_CHEST
    name: "&aTPS"
    lore: ["", "&e%server_tps_1%&7, &e%server_tps_5%&7, &e%server_tps_15%"]
  }
  {
    slot: 25
    material: COMPASS
    name: "&aWorld"
    lore: ["", "&e%player_world%"]
  }

  ${buttonClose} { slot: 31 }
]
