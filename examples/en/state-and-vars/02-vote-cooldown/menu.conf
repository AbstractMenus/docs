# Vote Cooldown - global vote counter + per-player 24h cooldown
# Docs: https://abstractmenus.github.io/docs/en/examples/state-and-vars/vote-cooldown
# Open: /ame_vote
# Requires: -

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Daily Vote"
size: 3
updateInterval: 20

activators {
  command: "ame_vote"
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # Global vote count - shows how many total votes the server has received.
  {
    slot: 11
    material: BEACON
    name: "&6Total Server Votes"
    lore: ["", "&e%var_:ame_vote_total:0%", "", "&8(All-time count, all players)"]
  }

  # ========== Vote button - dual variant ==========
  # ON COOLDOWN variant: per-player temporal var exists, can't vote yet.
  {
    slot: 13
    material: GRAY_DYE
    name: "&7Vote (on cooldown)"
    lore: [
      "&7You've already voted recently."
      ""
      "&cAvailable in &e%varpt_:ame_vote_cd%"
    ]
    rules { existVarp: "ame_vote_cd" }
  }
  # READY variant: no cooldown, click to vote.
  {
    slot: 13
    material: LIME_DYE
    name: "&aVote!"
    lore: [
      "&7Click to vote for the server."
      "&7You can vote once every 24 hours."
    ]
    click {
      actions {
        # Increment the global vote counter.
        incVar: "ame_vote_total"
        # Set per-player cooldown that auto-expires after 1 day.
        setVarp: "ame_vote_cd::1::1d"
        sound: ${successSound}
        message: "&aThanks for voting! Come back in 24 hours."
        refreshMenu: true
      }
    }
  }

  # Reward earned info
  {
    slot: 15
    material: DIAMOND
    name: "&bVoting rewards"
    lore: [
      "&7Each vote gives:"
      "&7- &f$100"
      "&7- &f1 vote token"
      "&7- &fchance for diamonds"
      ""
      "&8Configure in your vote handler"
    ]
  }

  ${buttonClose} { slot: 22 }
]
