# Counter & Toggle - personal variable demo
# Docs: https://abstractmenus.github.io/docs/en/examples/state-and-vars/counter-toggle
# Open: /ame_counter
# Requires: -

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Counter & Toggle"
size: 3

activators {
  command: "ame_counter"
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # ========== Counter section ==========
  # Reset counter
  {
    slot: 10
    material: BARRIER
    name: "&cReset counter"
    lore: ["&7Click to clear the counter."]
    click {
      actions {
        removeVarp: "ame_counter"
        sound: ${clickSound}
        refreshMenu: true
      }
    }
  }

  # Decrement
  {
    slot: 11
    material: RED_WOOL
    name: "&c-1"
    click {
      actions {
        decVarp: "ame_counter"
        sound: ${clickSound}
        refreshMenu: true
      }
    }
  }

  # Counter display - default 0 if var not set
  {
    slot: 12
    material: BOOK
    name: "&6Counter: &e%varp_:ame_counter:0%"
    lore: ["&7Your personal counter, persisted between sessions."]
  }

  # Increment
  {
    slot: 13
    material: GREEN_WOOL
    name: "&a+1"
    click {
      actions {
        incVarp: "ame_counter"
        sound: ${clickSound}
        refreshMenu: true
      }
    }
  }

  # ========== Toggle section ==========
  # Dual-item pattern: first item renders when var exists,
  # second item renders when it doesn't.

  # Toggle ON state (visible only when var exists)
  {
    slot: 15
    material: LIME_DYE
    name: "&aToggle: ON"
    lore: ["&7Click to turn OFF."]
    rules { existVarp: "ame_toggle" }
    click {
      actions {
        removeVarp: "ame_toggle"
        sound: ${clickSound}
        refreshMenu: true
      }
    }
  }

  # Toggle OFF state (fallback, no rules - renders when ON variant hides)
  {
    slot: 15
    material: GRAY_DYE
    name: "&7Toggle: OFF"
    lore: ["&7Click to turn ON."]
    click {
      actions {
        setVarp: "ame_toggle::1"
        sound: ${clickSound}
        refreshMenu: true
      }
    }
  }

  ${buttonClose} { slot: 22 }
]
