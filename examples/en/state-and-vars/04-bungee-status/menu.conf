# Bungee Status - server picker showing online counts via BungeeCord
# Docs: https://abstractmenus.github.io/docs/en/examples/state-and-vars/bungee-status
# Open: /ame_servers
# Requires: BungeeCord proxy (or Velocity) with named backends

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Server Selector"
size: 3
updateInterval: 40

activators {
  command: "ame_servers"
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # Lobby
  {
    slot: 10
    material: BOOKSHELF
    name: "&e&lLobby"
    lore: [
      "&7Main hub for picking modes."
      ""
      "&7Online: &e%bungee_lobby%"
      ""
      "&a> Click to connect"
    ]
    glow: true
    click {
      bungeeConnect: "lobby"
    }
  }

  # Survival
  {
    slot: 12
    material: GRASS_BLOCK
    name: "&e&lSurvival"
    lore: [
      "&7Vanilla-style survival world."
      ""
      "&7Online: &e%bungee_survival%"
      ""
      "&a> Click to connect"
    ]
    click {
      bungeeConnect: "survival"
    }
  }

  # SkyWars
  {
    slot: 14
    material: ENDER_EYE
    name: "&e&lSky Wars"
    lore: [
      "&7PvP minigame on islands."
      ""
      "&7Online: &e%bungee_sw%"
      ""
      "&a> Click to connect"
    ]
    click {
      bungeeConnect: "sw"
    }
  }

  # Build Battle
  {
    slot: 16
    material: BRICKS
    name: "&e&lBuild Battle"
    lore: [
      "&7Themed build competitions."
      ""
      "&7Online: &e%bungee_bb%"
      ""
      "&a> Click to connect"
    ]
    click {
      bungeeConnect: "bb"
    }
  }

  ${buttonClose} { slot: 22 }
]
