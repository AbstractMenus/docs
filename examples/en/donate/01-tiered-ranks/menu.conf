# Tiered Ranks Donate Store - 4 ranks with HAS_RANK / NO_RANK dual items
# Docs: https://abstractmenus.github.io/docs/en/examples/donate/tiered-ranks
# Open: /ame_donate
# Requires: LuckPerms

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Donate Store - Ranks"
size: 5

activators {
  command: ["ame_donate", "ame_support"]
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "36-44" }

  # Header
  {
    slot: 4
    material: NETHER_STAR
    name: "&6&lSupport MyTestServer"
    lore: ["&7Pick a rank to learn more.", "&7Buying ranks supports the server."]
  }

  # ========== Knight ==========
  # HAS_RANK variant: player already has knight permission, can't buy again.
  {
    slot: 19
    material: IRON_SWORD
    name: "&7Knight &8(&aOwned&8)"
    lore: [
      "&7Tier 1 supporter rank."
      ""
      "&aYou already own this rank."
      "&7Consider upgrading below."
    ]
    flags: HIDE_ATTRIBUTES
    rules { permission: "myserver.rank.knight" }
  }
  # NO_RANK variant: doesn't have it yet, show price.
  {
    slot: 19
    material: IRON_SWORD
    name: "&7Knight"
    lore: [
      "&7Tier 1 supporter rank."
      ""
      "&7Includes:"
      "&7- &fcolored chat name"
      "&7- &f3 home points"
      ""
      "&ePrice: &a$5"
      ""
      "&aLeft-click to learn more"
    ]
    flags: HIDE_ATTRIBUTES
    click {
      actions {
        # In production, this would open a confirm/purchase URL menu.
        # For the example, just inform.
        message: "&aOpen the donate page at https://example.org to purchase Knight."
        sound: ${clickSound}
      }
    }
  }

  # ========== Paladin ==========
  {
    slot: 21
    material: GOLDEN_SWORD
    name: "&6Paladin &8(&aOwned&8)"
    lore: ["&7Tier 2 supporter rank.", "", "&aYou already own this rank."]
    flags: HIDE_ATTRIBUTES
    rules { permission: "myserver.rank.paladin" }
  }
  {
    slot: 21
    material: GOLDEN_SWORD
    name: "&6Paladin"
    lore: [
      "&7Tier 2 supporter rank."
      ""
      "&7Includes:"
      "&7- &feverything from Knight"
      "&7- &f5 home points"
      "&7- &f/fly in build worlds"
      ""
      "&ePrice: &a$15"
    ]
    flags: HIDE_ATTRIBUTES
    click {
      actions {
        message: "&aOpen the donate page at https://example.org to purchase Paladin."
        sound: ${clickSound}
      }
    }
  }

  # ========== Lord ==========
  {
    slot: 23
    material: DIAMOND_SWORD
    name: "&bLord &8(&aOwned&8)"
    lore: ["&7Tier 3 supporter rank.", "", "&aYou already own this rank."]
    flags: HIDE_ATTRIBUTES
    rules { permission: "myserver.rank.lord" }
  }
  {
    slot: 23
    material: DIAMOND_SWORD
    name: "&bLord"
    lore: [
      "&7Tier 3 supporter rank."
      ""
      "&7Includes:"
      "&7- &feverything from Paladin"
      "&7- &fcustom join messages"
      "&7- &f10 home points"
      ""
      "&ePrice: &a$30"
    ]
    flags: HIDE_ATTRIBUTES
    click {
      actions {
        message: "&aOpen the donate page at https://example.org to purchase Lord."
        sound: ${clickSound}
      }
    }
  }

  # ========== Monarch ==========
  {
    slot: 25
    material: NETHERITE_SWORD
    name: "&dMonarch &8(&aOwned&8)"
    lore: ["&7Tier 4 supporter rank.", "", "&aYou already own this rank."]
    flags: HIDE_ATTRIBUTES
    rules { permission: "myserver.rank.monarch" }
  }
  {
    slot: 25
    material: NETHERITE_SWORD
    name: "&dMonarch"
    lore: [
      "&7Tier 4 supporter rank, the highest tier."
      ""
      "&7Includes:"
      "&7- &feverything from Lord"
      "&7- &fparticle effect on join"
      "&7- &fpriority queue when full"
      ""
      "&ePrice: &a$60"
    ]
    flags: HIDE_ATTRIBUTES
    click {
      actions {
        message: "&aOpen the donate page at https://example.org to purchase Monarch."
        sound: ${clickSound}
      }
    }
  }

  ${buttonClose} { slot: 40 }
]
