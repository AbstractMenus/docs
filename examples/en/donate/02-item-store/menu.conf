# Donate Item Store - buy in-game items with donor tokens
# Docs: https://abstractmenus.github.io/docs/en/examples/donate/item-store
# Open: /ame_store
# Requires: Vault (or PlayerPoints addon for donor tokens)

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Donate Item Store"
size: 3

activators {
  command: "ame_store"
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # Header
  {
    slot: 4
    material: NETHER_STAR
    name: "&6&lDonate Items"
    lore: ["&7Special items purchasable with", "&7donor currency."]
  }

  # Mythic sword
  {
    slot: 11
    material: NETHERITE_SWORD
    name: "&dMythic Sword"
    lore: [
      "&7A unique enchanted sword."
      ""
      "&7Sharpness V"
      "&7Unbreaking III"
      "&7Mending"
      ""
      "&ePrice: &a1000 tokens"
    ]
    flags: HIDE_ATTRIBUTES
    click {
      rules { money: 1000 }
      actions {
        takeMoney: 1000
        itemAdd {
          material: NETHERITE_SWORD
          name: "&dMythic Sword"
          enchantments {
            sharpness: 5
            unbreaking: 3
            mending: 1
          }
        }
        sound: ${successSound}
        message: "&dYou received the Mythic Sword!"
      }
      denyActions: ${denyNoMoney}
    }
  }

  # Permanent fly token
  {
    slot: 13
    material: ELYTRA
    name: "&bElytra"
    lore: [
      "&7Vanilla elytra for survival flight."
      ""
      "&ePrice: &a500 tokens"
    ]
    flags: HIDE_ATTRIBUTES
    click {
      rules { money: 500 }
      actions {
        takeMoney: 500
        itemAdd { material: ELYTRA }
        sound: ${successSound}
        message: "&aElytra added to inventory."
      }
      denyActions: ${denyNoMoney}
    }
  }

  # Heads pack
  {
    slot: 15
    material: PLAYER_HEAD
    name: "&6Cosmetic Heads Pack (5x)"
    lore: [
      "&7Five custom-textured player heads"
      "&7for decoration."
      ""
      "&ePrice: &a100 tokens"
    ]
    click {
      rules { money: 100 }
      actions {
        takeMoney: 100
        itemAdd: [
          { material: PLAYER_HEAD, count: 5 }
        ]
        sound: ${successSound}
        message: "&aHeads pack delivered."
      }
      denyActions: ${denyNoMoney}
    }
  }

  ${buttonClose} { slot: 22 }
]
