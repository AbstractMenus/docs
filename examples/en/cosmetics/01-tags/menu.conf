# Tag Selector - LuckPerms meta-based prefix tags
# Docs: https://abstractmenus.github.io/docs/en/examples/cosmetics/tags
# Open: /ame_tags
# Requires: LuckPerms

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Choose your tag"
size: 3

activators {
  command: "ame_tags"
}

# Reusable tag-application click handler. Each tag references it with the tag string overridden.
applyTag {
  actions {
    lpMetaSet {
      metaList: [
        { key: "ame_tag", value: "%selected_tag%" }
      ]
    }
    sound: ${successSound}
    closeMenu: true
  }
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # Heart tag
  {
    slot: 11
    material: RED_DYE
    name: "&c♥ Heart"
    lore: ["&7Pink heart symbol next to your name."]
    click {
      actions {
        lpMetaSet {
          metaList: [{ key: "ame_tag", value: "&c♥" }]
        }
        sound: ${successSound}
        message: "&cTag set to &c♥"
        closeMenu: true
      }
    }
  }

  # Star tag
  {
    slot: 12
    material: NETHER_STAR
    name: "&e★ Star"
    lore: ["&7Yellow star symbol."]
    click {
      actions {
        lpMetaSet {
          metaList: [{ key: "ame_tag", value: "&e★" }]
        }
        sound: ${successSound}
        message: "&eTag set to &e★"
        closeMenu: true
      }
    }
  }

  # Crown tag - VIP only
  {
    slot: 13
    material: GOLDEN_HELMET
    name: "&6♛ Crown &8(VIP)"
    lore: ["&7Royal crown.", "", "&8Requires VIP rank"]
    rules { permission: "abstractmenus.vip" }
    click {
      actions {
        lpMetaSet {
          metaList: [{ key: "ame_tag", value: "&6♛" }]
        }
        sound: ${successSound}
        message: "&6Tag set to &6♛"
        closeMenu: true
      }
    }
    denyActions: ${denyNoPerm}
  }

  # Skull tag
  {
    slot: 14
    material: SKELETON_SKULL
    name: "&8☠ Skull"
    lore: ["&7Spooky skull symbol."]
    click {
      actions {
        lpMetaSet {
          metaList: [{ key: "ame_tag", value: "&8☠" }]
        }
        sound: ${successSound}
        message: "&8Tag set to &8☠"
        closeMenu: true
      }
    }
  }

  # Reset / clear tag
  {
    slot: 15
    material: BARRIER
    name: "&7Clear tag"
    lore: ["&7Remove your current tag."]
    click {
      actions {
        lpMetaRemove: ["ame_tag"]
        sound: ${clickSound}
        message: "&7Tag removed."
        closeMenu: true
      }
    }
  }

  ${buttonClose} { slot: 22 }
]
