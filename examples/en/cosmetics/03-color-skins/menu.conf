# Color Skins - skin chooser using setSkin action
# Docs: https://abstractmenus.github.io/docs/en/examples/cosmetics/color-skins
# Open: /ame_skins
# Requires: SkinsRestorer

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Skin Chooser"
size: 3

activators {
  command: "ame_skins"
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  {
    slot: 4
    material: PLAYER_HEAD
    name: "&6&lChoose a Skin"
    lore: ["&7Pick a color to apply to your character."]
  }

  # The 4 color variants. Replace texture and signature with values from
  # https://mineskin.org for real skins. The placeholders below will be
  # accepted by HOCON but rejected by SkinsRestorer at runtime.

  {
    slot: 10
    material: PLAYER_HEAD
    texture: "REPLACE_WITH_PREVIEW_TEXTURE_HASH_GOLD"
    name: "&6Gold"
    click {
      actions {
        closeMenu: 1
        setSkin {
          texture: "REPLACE_WITH_TEXTURE_BASE64_GOLD"
          signature: "REPLACE_WITH_SIGNATURE_GOLD"
        }
        sound: ${successSound}
        message: "&aGold skin applied. Reconnect to see changes."
      }
    }
  }

  {
    slot: 12
    material: PLAYER_HEAD
    texture: "REPLACE_WITH_PREVIEW_TEXTURE_HASH_PURPLE"
    name: "&dPurple"
    click {
      actions {
        closeMenu: 1
        setSkin {
          texture: "REPLACE_WITH_TEXTURE_BASE64_PURPLE"
          signature: "REPLACE_WITH_SIGNATURE_PURPLE"
        }
        sound: ${successSound}
        message: "&dPurple skin applied. Reconnect to see changes."
      }
    }
  }

  {
    slot: 14
    material: PLAYER_HEAD
    texture: "REPLACE_WITH_PREVIEW_TEXTURE_HASH_BLUE"
    name: "&9Blue"
    click {
      actions {
        closeMenu: 1
        setSkin {
          texture: "REPLACE_WITH_TEXTURE_BASE64_BLUE"
          signature: "REPLACE_WITH_SIGNATURE_BLUE"
        }
        sound: ${successSound}
        message: "&9Blue skin applied. Reconnect to see changes."
      }
    }
  }

  {
    slot: 16
    material: BARRIER
    name: "&7Reset to default"
    lore: ["&7Restore your original skin."]
    click {
      actions {
        closeMenu: 1
        resetSkin: true
        sound: ${clickSound}
        message: "&7Default skin restored. Reconnect to see changes."
      }
    }
  }

  ${buttonClose} { slot: 22 }
]
