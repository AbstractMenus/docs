# Prefixes - LuckPerms group-based prefix selector
# Docs: https://abstractmenus.github.io/docs/en/examples/cosmetics/prefixes
# Open: /ame_prefixes
# Requires: LuckPerms

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Choose your prefix"
size: 3

activators {
  command: "ame_prefixes"
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # Each prefix is a LuckPerms group. Clicking adds the player to that group
  # (and removes them from the others, so only one prefix is active at a time).

  {
    slot: 11
    material: GREEN_WOOL
    name: "&a[Member]"
    lore: [
      "&7The default prefix."
      "&7Free for all players."
    ]
    click {
      actions {
        bulk: [
          { removeGroup: "ame_prefix_donor" }
          { removeGroup: "ame_prefix_admin" }
          { addGroup: "ame_prefix_member" }
        ]
        sound: ${successSound}
        message: "&aPrefix set to [Member]."
        closeMenu: true
      }
    }
  }

  {
    slot: 13
    material: GOLD_INGOT
    name: "&6[Donor]"
    lore: [
      "&7Donor prefix."
      "&7Available for supporters."
      "",
      "&8Requires donor permission"
    ]
    rules { permission: "abstractmenus.donator" }
    click {
      actions {
        bulk: [
          { removeGroup: "ame_prefix_member" }
          { removeGroup: "ame_prefix_admin" }
          { addGroup: "ame_prefix_donor" }
        ]
        sound: ${successSound}
        message: "&6Prefix set to [Donor]."
        closeMenu: true
      }
    }
    denyActions: ${denyNoPerm}
  }

  {
    slot: 15
    material: NETHERITE_INGOT
    name: "&c[Admin]"
    lore: [
      "&7Admin prefix."
      "",
      "&8Requires admin permission"
    ]
    rules { permission: "abstractmenus.admin" }
    click {
      actions {
        bulk: [
          { removeGroup: "ame_prefix_member" }
          { removeGroup: "ame_prefix_donor" }
          { addGroup: "ame_prefix_admin" }
        ]
        sound: ${successSound}
        message: "&cPrefix set to [Admin]."
        closeMenu: true
      }
    }
    denyActions: ${denyNoPerm}
  }

  ${buttonClose} { slot: 22 }
]
