# Daily Kit with Cooldown - temporal vars + dual-item pattern
# Docs: https://abstractmenus.github.io/docs/en/examples/kits-and-rewards/daily-kit-cooldown
# Open: /ame_daily_kit
# Requires: LuckPerms (for group rule on the VIP kit)

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Daily Kits"
size: 3
updateInterval: 20

activators {
  command: "ame_daily_kit"
}

# Template definitions - shared between the "ready" and "on cooldown" item variants

defaultKitTemplate {
  slot: 11
  material: WOODEN_SWORD
  name: "&aDefault Kit"
  flags: HIDE_ATTRIBUTES
  lore: [
    "&7Includes:"
    "&7- Leather armor set"
    "&7- Wooden sword"
    "&7- 32 cooked beef"
    "&7- 16 iron ingots"
  ]
}

vipKitTemplate {
  slot: 15
  material: STONE_SWORD
  name: "&6VIP Kit"
  flags: HIDE_ATTRIBUTES
  lore: [
    "&7Includes:"
    "&7- Leather armor set"
    "&7- Stone sword"
    "&7- 32 cooked beef"
    "&7- 32 iron ingots"
    "&7- 4 golden apples"
    ""
    "&8Requires: VIP group"
  ]
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # ========== Default kit ==========
  # READY state: shown when no cooldown variable exists. Clicking claims the kit.
  ${defaultKitTemplate} {
    lore: ${defaultKitTemplate.lore} [
      ""
      "&aClick to claim"
    ]
    click {
      actions {
        itemAdd: [
          { material: LEATHER_HELMET }
          { material: LEATHER_CHESTPLATE }
          { material: LEATHER_LEGGINGS }
          { material: LEATHER_BOOTS }
          { material: WOODEN_SWORD }
          { material: COOKED_BEEF, count: 32 }
          { material: IRON_INGOT, count: 16 }
        ]
        # Set a temporal var that expires after 1 day - the ::1d suffix.
        setVarp: "ame_kit_default::1::1d"
        sound: ${successSound}
        message: "&aDefault kit claimed. Come back in 24 hours."
        refreshMenu: true
      }
    }
  }
  # COOLDOWN state: shown only while the temporal var exists. Displays time remaining.
  ${defaultKitTemplate} {
    material: GRAY_DYE
    lore: ${defaultKitTemplate.lore} [
      ""
      "&cAvailable in &e%varpt_:ame_kit_default%"
    ]
    rules {
      existVarp: "ame_kit_default"
    }
  }

  # ========== VIP kit ==========
  ${vipKitTemplate} {
    lore: ${vipKitTemplate.lore} [
      ""
      "&aClick to claim"
    ]
    click {
      rules {
        group: "vip"
      }
      actions {
        itemAdd: [
          { material: LEATHER_HELMET }
          { material: LEATHER_CHESTPLATE }
          { material: LEATHER_LEGGINGS }
          { material: LEATHER_BOOTS }
          { material: STONE_SWORD }
          { material: COOKED_BEEF, count: 32 }
          { material: IRON_INGOT, count: 32 }
          { material: GOLDEN_APPLE, count: 4 }
        ]
        setVarp: "ame_kit_vip::1::1d"
        sound: ${successSound}
        message: "&6VIP kit claimed. Come back in 24 hours."
        refreshMenu: true
      }
      denyActions: ${denyNoPerm}
    }
  }
  ${vipKitTemplate} {
    material: GRAY_DYE
    lore: ${vipKitTemplate.lore} [
      ""
      "&cAvailable in &e%varpt_:ame_kit_vip%"
    ]
    rules {
      existVarp: "ame_kit_vip"
    }
  }

  ${buttonClose} { slot: 22 }
]
