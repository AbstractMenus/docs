# Basic Kit - one-click reward bundle
# Docs: https://abstractmenus.github.io/docs/en/examples/kits-and-rewards/basic-kit
# Open: /ame_kit
# Requires: -

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Starter Kit"
size: 3

activators {
  command: "ame_kit"
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # Description card
  {
    slot: 4
    material: PAPER
    name: "&6&lStarter Kit"
    lore: [
      "&7Get a one-time bundle of starter items"
      "&7and 50 XP to begin your adventure."
      ""
      "&eContents:"
      "&7- Iron Sword"
      "&7- Iron Pickaxe"
      "&7- Bread x16"
      "&7- 50 XP"
    ]
  }

  # Claim button
  {
    slot: 13
    material: CHEST
    name: "&aClaim Kit"
    lore: [
      "&7Click to receive your kit."
    ]
    click {
      actions {
        itemAdd: [
          { material: IRON_SWORD }
          { material: IRON_PICKAXE }
          { material: BREAD, count: 16 }
        ]
        giveXp: 50
        sound: ${successSound}
        message: "&aYou claimed the Starter Kit!"
        closeMenu: 20
      }
    }
  }

  ${buttonClose} { slot: 22 }
]
