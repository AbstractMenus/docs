# Tiered Kits - 3 kit tiers gated by permission, no cooldown
# Docs: https://abstractmenus.github.io/docs/en/examples/kits-and-rewards/tiered-kits
# Open: /ame_kit_tiers
# Requires: LuckPerms

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Tiered Kits"
size: 3

activators {
  command: "ame_kit_tiers"
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # ========== Default kit (everyone) ==========
  {
    slot: 11
    material: WOODEN_SWORD
    name: "&7Default Kit"
    flags: HIDE_ATTRIBUTES
    lore: [
      "&7Includes:"
      "&7- Wooden sword"
      "&7- 8 bread"
      ""
      "&aFree for everyone"
      "&aClick to claim"
    ]
    click {
      actions {
        itemAdd: [
          { material: WOODEN_SWORD }
          { material: BREAD, count: 8 }
        ]
        sound: ${successSound}
        message: "&aDefault kit claimed."
      }
    }
  }

  # ========== VIP kit (permission-gated) ==========
  {
    slot: 13
    material: STONE_SWORD
    name: "&6VIP Kit"
    flags: HIDE_ATTRIBUTES
    lore: [
      "&7Includes:"
      "&7- Stone sword"
      "&7- Iron armor (full set)"
      "&7- 16 bread, 4 golden apples"
      ""
      "&8Requires: VIP rank"
      "&aClick to claim"
    ]
    click {
      rules { permission: "abstractmenus.vip" }
      actions {
        itemAdd: [
          { material: STONE_SWORD }
          { material: IRON_HELMET }
          { material: IRON_CHESTPLATE }
          { material: IRON_LEGGINGS }
          { material: IRON_BOOTS }
          { material: BREAD, count: 16 }
          { material: GOLDEN_APPLE, count: 4 }
        ]
        sound: ${successSound}
        message: "&6VIP kit claimed."
      }
      denyActions: ${denyNoPerm}
    }
  }

  # ========== Elite kit (higher permission) ==========
  {
    slot: 15
    material: DIAMOND_SWORD
    name: "&dElite Kit"
    flags: HIDE_ATTRIBUTES
    lore: [
      "&7Includes:"
      "&7- Diamond sword"
      "&7- Diamond armor (full set)"
      "&7- 32 bread, 8 enchanted golden apples"
      ""
      "&8Requires: Elite rank"
      "&aClick to claim"
    ]
    click {
      rules { permission: "abstractmenus.elite" }
      actions {
        itemAdd: [
          { material: DIAMOND_SWORD }
          { material: DIAMOND_HELMET }
          { material: DIAMOND_CHESTPLATE }
          { material: DIAMOND_LEGGINGS }
          { material: DIAMOND_BOOTS }
          { material: BREAD, count: 32 }
          { material: ENCHANTED_GOLDEN_APPLE, count: 8 }
        ]
        sound: ${successSound}
        message: "&dElite kit claimed."
      }
      denyActions: ${denyNoPerm}
    }
  }

  ${buttonClose} { slot: 22 }
]
