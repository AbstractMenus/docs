# Snippet: chance rule for probabilistic display
# Docs: https://abstractmenus.github.io/docs/en/examples/snippets/rule-chance
# Open: /ame_snip_chance

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Chance Rule"
size: 1
activators { command: "ame_snip_chance" }

items: [
  # 30% chance to render this rare item at slot 4
  {
    slot: 4
    material: NETHER_STAR
    name: "&dRare Star"
    lore: ["&730% chance to appear."]
    rules { chance: 30 }
  }
  # Fallback: 70% chance the slot stays empty (no fallback item, slot just blank)
  ${buttonClose} { slot: 8 }
]
