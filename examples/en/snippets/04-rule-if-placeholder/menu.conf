# Snippet: if rule with placeholder expression
# Docs: https://abstractmenus.github.io/docs/en/examples/snippets/rule-if-placeholder
# Open: /ame_snip_if

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6If Rule"
size: 1
activators { command: "ame_snip_if" }

items: [
  # Visible only if the player has level 10+. Compares a placeholder via expression.
  {
    slot: 4
    material: ENCHANTED_BOOK
    name: "&aLevel 10+ Reward"
    lore: ["&7Visible to anyone level 10 or higher."]
    rules {
      if: "%player_level% >= 10"
    }
    click {
      actions {
        itemAdd { material: EXPERIENCE_BOTTLE, count: 4 }
        sound: ${successSound}
      }
    }
  }

  # Fallback message for low-level players
  {
    slot: 4
    material: BARRIER
    name: "&cLevel too low"
    lore: ["&7Reach level 10 to claim this reward."]
  }

  ${buttonClose} { slot: 8 }
]
