# Snippet: clickItem activator - open menu by right-clicking an item in hand
# Docs: https://abstractmenus.github.io/docs/en/examples/snippets/activator-clickitem
# Open: hold a NETHER_STAR named "Menu Wand" and right-click it.
# (To get one for testing: /give @s minecraft:nether_star{display:{Name:'{"text":"Menu Wand"}'}})
# Requires: -

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Menu opened by item click"
size: 1

activators {
  clickItem {
    material: NETHER_STAR
    name: "&6Menu Wand"
  }
}

items: [
  {
    slot: 4
    material: BOOK
    name: "&aIt worked"
    lore: [
      "&7You opened this menu by right-clicking"
      "&7a NETHER_STAR named &6Menu Wand&7 in your hand."
      ""
      "&7See activators docs for clickEntity, clickBlockType,"
      "&7clickNPC, regionJoin, and others."
    ]
  }
  ${buttonClose} { slot: 8 }
]
