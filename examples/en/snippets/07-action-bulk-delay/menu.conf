# Snippet: bulk + delay action wrappers
# Docs: https://abstractmenus.github.io/docs/en/examples/snippets/action-bulk-delay
# Open: /ame_snip_bulkdelay

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Bulk + Delay"
size: 1
activators { command: "ame_snip_bulkdelay" }

items: [
  {
    slot: 4
    material: TNT
    name: "&cMulti-step countdown"
    lore: [
      "&7Click - get a sequence of messages"
      "&7and a sound at the end."
    ]
    click {
      actions {
        # bulk = list of action groups, executed in order
        bulk: [
          { message: "&e3..." }
          { message: "&62..." }
          { message: "&c1..." }
        ]
        # delay = run the wrapped actions block N ticks later
        delay {
          delay: 60
          actions {
            sound: ${successSound}
            message: "&aBoom!"
          }
        }
      }
    }
  }
  ${buttonClose} { slot: 8 }
]
