# Snippet: and / or logical wrappers
# Docs: https://abstractmenus.github.io/docs/en/examples/snippets/rule-and-or
# Open: /ame_snip_andor

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Logical Rules"
size: 1
activators { command: "ame_snip_andor" }

items: [
  # AND - all sub-rules must match. (rules block defaults to AND, this is here for explicit demo.)
  {
    slot: 2
    material: DIAMOND_SWORD
    name: "&bAdmin in CREATIVE"
    lore: ["&7Need: admin permission AND creative mode."]
    flags: HIDE_ATTRIBUTES
    rules {
      and {
        permission: "abstractmenus.admin"
        gamemode: CREATIVE
      }
    }
  }

  # OR - at least one sub-rule matches.
  {
    slot: 6
    material: GOLDEN_APPLE
    name: "&aVIP or rich"
    lore: ["&7Need: VIP permission OR $1000."]
    rules {
      or {
        permission: "abstractmenus.vip"
        money: 1000
      }
    }
  }

  ${buttonClose} { slot: 8 }
]
