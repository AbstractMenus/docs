# Snippet: randActions for one-of-N random outcome
# Docs: https://abstractmenus.github.io/docs/en/examples/snippets/action-rand-actions
# Open: /ame_snip_rand

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Random Actions"
size: 1
activators { command: "ame_snip_rand" }

items: [
  {
    slot: 4
    material: ENDER_PEARL
    name: "&5Lucky Roll"
    lore: ["&7Click - random outcome from 4 options."]
    click {
      actions {
        # Pick exactly one of the 4 entries at random and run its block.
        randActions: [
          {
            sound: ${successSound}
            message: "&aJackpot! +10 XP"
            giveXp: 10
          }
          {
            sound: ${successSound}
            message: "&eDecent. +1 emerald"
            itemAdd { material: EMERALD }
          }
          {
            sound: ${clickSound}
            message: "&7Meh. +5 cooked beef"
            itemAdd { material: COOKED_BEEF, count: 5 }
          }
          {
            sound: ${failSound}
            message: "&cBetter luck next time."
          }
        ]
      }
    }
  }
  ${buttonClose} { slot: 8 }
]
