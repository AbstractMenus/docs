# Snippet: money rule + takeMoney
# Docs: https://abstractmenus.github.io/docs/en/examples/snippets/rule-money
# Open: /ame_snip_money

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Money Rule"
size: 1
activators { command: "ame_snip_money" }

items: [
  {
    slot: 4
    material: GOLDEN_APPLE
    name: "&6Buy Golden Apple"
    lore: ["&7Price: &a$50"]
    click {
      rules { money: 50 }
      actions {
        takeMoney: 50
        itemAdd { material: GOLDEN_APPLE }
        sound: ${successSound}
      }
      denyActions: ${denyNoMoney}
    }
  }
  ${buttonClose} { slot: 8 }
]
