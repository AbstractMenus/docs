# Snippet: permission rule
# Docs: https://abstractmenus.github.io/docs/en/examples/snippets/rule-permission
# Open: /ame_snip_perm

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Permission Rule"
size: 1
activators { command: "ame_snip_perm" }

items: [
  {
    slot: 4
    material: DIAMOND
    name: "&bAdmin Reward"
    lore: ["&7Click - admins only."]
    click {
      rules { permission: "abstractmenus.admin" }
      actions {
        itemAdd { material: DIAMOND }
        sound: ${successSound}
        message: "&aAdmin diamond claimed."
      }
      denyActions: ${denyNoPerm}
    }
  }
  ${buttonClose} { slot: 8 }
]
