# Inventory Crafting - craft items by consuming ingredients from inventory
# Docs: https://abstractmenus.github.io/docs/en/examples/snippets/inventory-crafting
# Open: /ame_craft
# Requires: -

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Hunter's Workbench"
size: 1

activators {
  command: "ame_craft"
}

# Recipe definitions kept at file level - the click block references them via ${...}.

helmetRecipe {
  output {
    material: LEATHER_HELMET
    name: "&aHunter's Hat"
    enchantments {
      durability: 2
    }
  }
  requirements: [
    { material: LEATHER, count: 5 }
  ]
}

chestplateRecipe {
  output {
    material: LEATHER_CHESTPLATE
    name: "&aHunter's Jacket"
    enchantments {
      durability: 2
      thorns: 1
    }
  }
  requirements: [
    { material: LEATHER, count: 8 }
    { material: STRING,  count: 1 }
    { material: IRON_INGOT, count: 1 }
  ]
}

items: [
  ${helmetRecipe.output} {
    slot: 2
    flags: HIDE_ATTRIBUTES
    lore: [
      "&7Required:"
      "&7- Leather x5"
      ""
      "&aClick to craft"
    ]
    click {
      rules {
        inventoryItems: ${helmetRecipe.requirements}
      }
      actions {
        itemRemove: ${helmetRecipe.requirements}
        itemAdd: ${helmetRecipe.output}
        sound: ${successSound}
        message: "&aYou crafted a Hunter's Hat!"
      }
      denyActions: ${denyNotEnoughItems}
    }
  }

  ${chestplateRecipe.output} {
    slot: 6
    flags: HIDE_ATTRIBUTES
    lore: [
      "&7Required:"
      "&7- Leather x8"
      "&7- String x1"
      "&7- Iron Ingot x1"
      ""
      "&aClick to craft"
    ]
    click {
      rules {
        inventoryItems: ${chestplateRecipe.requirements}
      }
      actions {
        itemRemove: ${chestplateRecipe.requirements}
        itemAdd: ${chestplateRecipe.output}
        sound: ${successSound}
        message: "&aYou crafted a Hunter's Jacket!"
      }
      denyActions: ${denyNotEnoughItems}
    }
  }

  ${buttonClose} { slot: 8 }
]

# Local deny action for missing-ingredients case
denyNotEnoughItems {
  sound:   ${deniedSound}
  message: "&cYou don't have enough materials."
}
