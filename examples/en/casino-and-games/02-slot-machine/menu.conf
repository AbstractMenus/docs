# Slot Machine - 3 reels animated independently with random outcomes
# Docs: https://abstractmenus.github.io/docs/en/examples/casino-and-games/slot-machine
# Open: /ame_slots
# Requires: Vault

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Slot Machine"
size: 3

activators {
  command: "ame_slots"
}

# Static items - the borders, header, and the cost note. Frames overlay reels.
items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  {
    slot: 4
    material: GOLD_INGOT
    name: "&6Slot Machine"
    lore: ["&7Cost per spin: &a$50", "&7Match all 3 to win big."]
  }

  ${buttonClose} { slot: 22 }
]

# After the last frame, randActions awards the prize. The 4 outcomes correspond
# to (loosely) the visual frames the player saw cycling.
onAnimEnd {
  randActions: [
    # 60% miss
    { sound: ${failSound},    message: "&7No match. -$50" }
    { sound: ${failSound},    message: "&7No match. -$50" }
    { sound: ${failSound},    message: "&7No match. -$50" }
    # 30% small win
    { sound: ${successSound}, message: "&aTriple cherries! +$80",       giveMoney: 80  }
    # 8% medium win
    { sound: ${successSound}, message: "&6Triple bells! +$200",         giveMoney: 200 }
    # 2% jackpot
    { sound: ${successSound}, message: "&dJACKPOT! Triple sevens! +$1000", giveMoney: 1000 }
  ]
}

# Three reels at slots 11, 13, 15. Each reel cycles through 5 symbols with a
# slowdown. Frames overlay all three at once - the symbols appear to spin
# in lockstep, which is enough for the demo. Spin-each-reel-separately
# would need separate animated menus or extension code.
frames: [
  { delay: 2, clear: false, items: [
    { slot: 11, material: APPLE,         name: "&c?" }
    { slot: 13, material: GOLD_INGOT,    name: "&6?" }
    { slot: 15, material: DIAMOND,       name: "&b?" }
  ]}
  { delay: 2, clear: false, items: [
    { slot: 11, material: GOLD_INGOT,    name: "&6?" }
    { slot: 13, material: DIAMOND,       name: "&b?" }
    { slot: 15, material: NETHER_STAR,   name: "&e?" }
  ]}
  { delay: 2, clear: false, items: [
    { slot: 11, material: DIAMOND,       name: "&b?" }
    { slot: 13, material: NETHER_STAR,   name: "&e?" }
    { slot: 15, material: APPLE,         name: "&c?" }
  ]}
  { delay: 4, clear: false, items: [
    { slot: 11, material: NETHER_STAR,   name: "&e?" }
    { slot: 13, material: APPLE,         name: "&c?" }
    { slot: 15, material: GOLD_INGOT,    name: "&6?" }
  ]}
  { delay: 8, clear: false, items: [
    { slot: 11, material: APPLE,         name: "&c?" }
    { slot: 13, material: APPLE,         name: "&c?" }
    { slot: 15, material: APPLE,         name: "&c?" }
  ]}
  { delay: 20, clear: false, items: [
    { slot: 11, material: NETHER_STAR,   name: "&eFINAL" }
    { slot: 13, material: NETHER_STAR,   name: "&eFINAL" }
    { slot: 15, material: NETHER_STAR,   name: "&eFINAL" }
  ]}
]
