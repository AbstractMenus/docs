# Daily Lottery - global jackpot accumulator + chance-based payout
# Docs: https://abstractmenus.github.io/docs/en/examples/casino-and-games/daily-lottery
# Open: /ame_lottery
# Requires: Vault

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Daily Lottery"
size: 3
updateInterval: 40

activators {
  command: "ame_lottery"
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # Jackpot display - reads the global accumulator var
  {
    slot: 4
    material: NETHER_STAR
    name: "&6&lCurrent Jackpot"
    lore: ["", "&e$%var_:ame_lottery_jackpot:0%", "", "&8Tickets cost $100. 50 of every 100 goes to jackpot."]
  }

  # Buy ticket button
  {
    slot: 13
    material: PAPER
    name: "&aBuy a ticket &8($100)"
    lore: [
      "&7Click to purchase a lottery ticket."
      ""
      "&7You roll a 1-in-50 chance to win"
      "&7the entire jackpot."
      ""
      "&7If you don't win, $50 of your ticket"
      "&7adds to the jackpot pool."
    ]
    click {
      rules { money: 100 }
      actions {
        takeMoney: 100
        # 1-in-50 chance to win the jackpot.
        bulk: [
          {
            rules { chance: 2 }
            actions {
              # Pay out the current jackpot value to the winner.
              # %var_:...% inside actions is the var lookup; this passes the current value.
              giveMoney: "%var_:ame_lottery_jackpot:0%"
              setVar: "ame_lottery_jackpot::0"
              sound: ${successSound}
              broadcast: "&6&lJACKPOT! &f%player_name% &awon $%var_:ame_lottery_jackpot:0% in the lottery!"
              message: "&6&lYou won the jackpot!"
            }
            denyActions {
              # No win - $50 of the ticket price goes into the jackpot.
              incVar { name: "ame_lottery_jackpot", amount: 50 }
              sound: ${failSound}
              message: "&7No win. $50 added to the jackpot."
            }
          }
        ]
        refreshMenu: true
      }
      denyActions: ${denyNoMoney}
    }
  }

  # Reset (admin only) - in case the menu state needs clearing in tests
  {
    slot: 16
    material: BARRIER
    name: "&cAdmin: reset jackpot to 0"
    lore: ["&8Admins only. For testing."]
    rules: ${rulesAdmin}
    click {
      actions {
        setVar: "ame_lottery_jackpot::0"
        sound: ${clickSound}
        message: "&aJackpot reset."
        refreshMenu: true
      }
    }
  }

  ${buttonClose} { slot: 22 }
]
