# Roulette - 8-frame slowdown animation + random prize via randActions
# Docs: https://abstractmenus.github.io/docs/en/examples/casino-and-games/roulette
# Open: /ame_roulette
# Requires: -

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Roulette"
size: 1

activators {
  command: "ame_roulette"
}

# Static items shown across all frames. clear: false on frames keeps these in place.
items: [
  ${borderBlack} { slot: 0 }
  ${borderBlack} { slot: 1 }
  ${borderBlack} { slot: 2 }
  ${borderBlack} { slot: 6 }
  ${borderBlack} { slot: 7 }
  ${buttonClose} { slot: 8 }
]

# Random prize awarded after the spin finishes.
onAnimEnd {
  randActions: [
    {
      sound: ${successSound}
      itemAdd { material: DIAMOND, count: 1 }
      message: "&bYou won 1 Diamond!"
    }
    {
      sound: ${successSound}
      itemAdd { material: EMERALD, count: 2 }
      message: "&aYou won 2 Emeralds!"
    }
    {
      sound: ${successSound}
      itemAdd { material: GOLD_INGOT, count: 4 }
      message: "&6You won 4 Gold Ingots!"
    }
    {
      sound: ${failSound}
      message: "&7Better luck next time."
    }
  ]
}

# Animation frames. Each frame has clear: false so static items survive.
# Delays grow toward the end to create a slowdown feel.
frames: [
  { delay: 2,  clear: false, items: [ { slot: 4, material: DIAMOND,    name: "&b?" } ] }
  { delay: 2,  clear: false, items: [ { slot: 4, material: EMERALD,    name: "&a?" } ] }
  { delay: 2,  clear: false, items: [ { slot: 4, material: GOLD_INGOT, name: "&6?" } ] }
  { delay: 2,  clear: false, items: [ { slot: 4, material: DIAMOND,    name: "&b?" } ] }
  { delay: 4,  clear: false, items: [ { slot: 4, material: EMERALD,    name: "&a?" } ] }
  { delay: 6,  clear: false, items: [ { slot: 4, material: GOLD_INGOT, name: "&6?" } ] }
  { delay: 10, clear: false, items: [ { slot: 4, material: DIAMOND,    name: "&b?" } ] }
  { delay: 20, clear: false, items: [ { slot: 4, material: NETHER_STAR, name: "&e?" } ] }
]
