# Random Enchanter - drag-and-drop + randActions enchant lottery
# Docs: https://abstractmenus.github.io/docs/en/examples/casino-and-games/enchanter
# Open: /ame_enchanter
# Requires: -

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Random Enchanter"
size: 3

activators {
  command: "ame_enchanter"
}

# Define which slots are draggable. Slot 11 (input) and slot 15 (result).
# `x` marks draggable, `-` is regular.
draggable: [
  "---------"
  "--x---x--"
  "---------"
]

# Default placeholder shown in the result slot when nothing has been enchanted yet.
resultStub {
  slot: 15
  material: WHITE_STAINED_GLASS_PANE
  name: "&7Result"
  lore: ["&8(empty)"]
}

# Action template: place the dragged item back into slot 15 with the chosen enchant.
# %changed_item_*% placeholders refer to whatever the player dropped into slot 11.
placeItemBase {
  slot: 15
  serialized: "%changed_item_serialized%"
  count: "%changed_item_amount%"
}

# The enchant button's full click block. Defined separately so it doesn't
# clutter the items list.
enchantClick {
  rules {
    # Slot 11 must NOT be empty (- prefix inverts the placedItem rule).
    -placedItem {
      slot: 11
      material: AIR
    }
  }
  actions {
    randActions: [
      { placeItem: ${placeItemBase} { enchantments { sharpness: 1, unbreaking: 2 } } }
      { placeItem: ${placeItemBase} { enchantments { efficiency: 2              } } }
      { placeItem: ${placeItemBase} { enchantments { fortune: 2,   unbreaking: 1 } } }
      { placeItem: ${placeItemBase} { enchantments { fire_aspect: 1              } } }
    ]
    # Take the input item out of slot 11 (it's been "consumed").
    removePlaced: 11
    sound: ${successSound}
  }
  # When clicked with empty input slot, restore the result-slot stub.
  denyActions {
    rules {
      placedItem {
        slot: 15
        material: AIR
      }
    }
    actions {
      setButton: ${resultStub}
      sound: ${deniedSound}
    }
  }
}

items: [
  # Decorative borders around the two draggable slots
  {
    slot: [
      "xxxxxxxxx"
      "xx-xxx-xx"
      "xxxxxxxxx"
    ]
    material: BLACK_STAINED_GLASS_PANE
    name: " "
  }

  # Empty result-slot placeholder
  ${resultStub}

  # The "Enchant!" button at slot 22 (bottom row, center)
  {
    slot: 22
    material: NETHER_STAR
    name: "&bEnchant!"
    lore: [
      "&7Drop a tool into the left slot,"
      "&7then click here to roll a random"
      "&7enchant onto it."
    ]
    click: ${enchantClick}
  }
]
