# Lucky Chest - chance rule + weighted randActions for prize tiers
# Docs: https://abstractmenus.github.io/docs/en/examples/casino-and-games/lucky-chest
# Open: /ame_chest
# Requires: Vault

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Lucky Chest"
size: 3

activators {
  command: "ame_chest"
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # Info card
  {
    slot: 4
    material: PAPER
    name: "&6Lucky Chest"
    lore: [
      "&7Pay $50 to open a chest."
      "&7You'll get one of:"
      ""
      "&7- &fcommon: 12 cooked beef &7(60%)"
      "&7- &auncommon: 1 emerald &7(30%)"
      "&7- &6rare: 1 enchanted golden apple &7(8%)"
      "&7- &dmythic: 1 netherite ingot &7(2%)"
    ]
  }

  # Open button
  {
    slot: 13
    material: CHEST
    name: "&aOpen Chest &8($50)"
    lore: ["&7Click to roll for a prize."]
    click {
      rules { money: 50 }
      actions {
        takeMoney: 50
        # Weighted random - entries appearing more times are more likely.
        randActions: [
          # 6 common entries = 60%
          { itemAdd { material: COOKED_BEEF, count: 12 }, sound: ${successSound}, message: "&7Common: 12 cooked beef." }
          { itemAdd { material: COOKED_BEEF, count: 12 }, sound: ${successSound}, message: "&7Common: 12 cooked beef." }
          { itemAdd { material: COOKED_BEEF, count: 12 }, sound: ${successSound}, message: "&7Common: 12 cooked beef." }
          { itemAdd { material: COOKED_BEEF, count: 12 }, sound: ${successSound}, message: "&7Common: 12 cooked beef." }
          { itemAdd { material: COOKED_BEEF, count: 12 }, sound: ${successSound}, message: "&7Common: 12 cooked beef." }
          { itemAdd { material: COOKED_BEEF, count: 12 }, sound: ${successSound}, message: "&7Common: 12 cooked beef." }
          # 3 uncommon entries = 30%
          { itemAdd { material: EMERALD }, sound: ${successSound}, message: "&aUncommon: 1 emerald!" }
          { itemAdd { material: EMERALD }, sound: ${successSound}, message: "&aUncommon: 1 emerald!" }
          { itemAdd { material: EMERALD }, sound: ${successSound}, message: "&aUncommon: 1 emerald!" }
          # ~1 rare = ~8% (we round to 1/12 since we have 12 entries total - close enough for demo)
          { itemAdd { material: ENCHANTED_GOLDEN_APPLE }, sound: ${successSound}, message: "&6Rare! Enchanted golden apple!" }
          # ~1 mythic = ~8% (technically 2% target but with 12 buckets we collapse rare and mythic)
          { itemAdd { material: NETHERITE_INGOT }, sound: ${successSound}, message: "&dMYTHIC! Netherite ingot!" }
          { itemAdd { material: NETHERITE_INGOT }, sound: ${successSound}, message: "&dMYTHIC! Netherite ingot!" }
        ]
      }
      denyActions: ${denyNoMoney}
    }
  }

  ${buttonClose} { slot: 22 }
]
