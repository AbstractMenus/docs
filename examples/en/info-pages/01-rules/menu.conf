# Server Rules - read-only info menu
# Docs: https://abstractmenus.github.io/docs/en/examples/info-pages/rules
# Open: /ame_rules
# Requires: -

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Server Rules"
size: 5

activators {
  command: "ame_rules"
}

items: [
  # Decorative borders
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "36-44" }

  # Header
  {
    slot: 4
    material: WRITTEN_BOOK
    name: "&6&lRules of MyTestServer"
    lore: [
      "&7Read carefully."
      "&7Breaking any rule may lead to a ban."
    ]
  }

  # Rule 1
  {
    slot: 19
    material: PAPER
    name: "&e1. No griefing"
    lore: [
      "&7Do not destroy or modify"
      "&7other players' builds without"
      "&7their explicit permission."
      ""
      "&8First offense: warning"
      "&8Repeat: 7-day ban"
    ]
  }

  # Rule 2
  {
    slot: 21
    material: PAPER
    name: "&e2. Be civil in chat"
    lore: [
      "&7No slurs, no harassment,"
      "&7no spam. English in main chat,"
      "&7other languages in their channels."
      ""
      "&8First offense: 1h mute"
      "&8Repeat: permanent mute"
    ]
  }

  # Rule 3
  {
    slot: 23
    material: PAPER
    name: "&e3. No cheating"
    lore: [
      "&7Hacked clients, x-ray, autoclicker,"
      "&7and similar mods are banned."
      "&7Optifine and shaders are fine."
      ""
      "&8First offense: permanent ban"
    ]
  }

  # Rule 4
  {
    slot: 25
    material: PAPER
    name: "&e4. No real-money trade"
    lore: [
      "&7Selling in-game items, ranks, or"
      "&7services for real money is banned."
      "&7Use the official donate menu only."
      ""
      "&8First offense: permanent ban"
    ]
  }

  # Close button
  ${buttonClose} { slot: 40 }
]
