# FAQ - hub menu of questions, click each to open the answer in a sub-menu
# Docs: https://abstractmenus.github.io/docs/en/examples/info-pages/faq
# Open: /ame_faq
# Requires: -

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

menus {

  # Main FAQ index - list of questions
  ame_faq {
    title: "&6Frequently Asked Questions"
    size: 3

    activators {
      command: "ame_faq"
    }

    items: [
      ${borderBlack} { slot: "0-8" }
      ${borderBlack} { slot: "18-26" }

      {
        slot: 4
        material: WRITTEN_BOOK
        name: "&6&lFAQ"
        lore: ["&7Click any question for the answer."]
      }

      {
        slot: 10
        material: PAPER
        name: "&aHow do I claim land?"
        click { openMenu: "ame_faq_a1" }
      }
      {
        slot: 12
        material: PAPER
        name: "&aWhat does VIP rank give me?"
        click { openMenu: "ame_faq_a2" }
      }
      {
        slot: 14
        material: PAPER
        name: "&aHow do I report a player?"
        click { openMenu: "ame_faq_a3" }
      }
      {
        slot: 16
        material: PAPER
        name: "&aWhere are server rules?"
        click { openMenu: "ame_rules" }
      }

      ${buttonClose} { slot: 22 }
    ]
  }

  # Answer 1 - Land claiming
  ame_faq_a1 {
    title: "&6FAQ - Land claiming"
    size: 3
    items: [
      ${borderBlack} { slot: "0-8" }
      ${borderBlack} { slot: "18-26" }
      {
        slot: 13
        material: GRASS_BLOCK
        name: "&aHow do I claim land?"
        lore: [
          "&7Use a golden shovel to mark"
          "&7the corners of your claim."
          ""
          "&7- Right-click first corner"
          "&7- Right-click opposite corner"
          ""
          "&7Each block costs 1 claim block."
          "&7Earn more by playing or buying"
          "&7with /buyclaimblocks."
        ]
      }
      ${buttonBack} { slot: 18, click { openMenu: "ame_faq" } }
    ]
  }

  # Answer 2 - VIP perks
  ame_faq_a2 {
    title: "&6FAQ - VIP perks"
    size: 3
    items: [
      ${borderBlack} { slot: "0-8" }
      ${borderBlack} { slot: "18-26" }
      {
        slot: 13
        material: GOLDEN_HELMET
        name: "&6What does VIP give me?"
        lore: [
          "&7VIP includes:"
          ""
          "&7- &fcolored chat name"
          "&7- &f5 home points (vs 1 default)"
          "&7- &fdaily VIP kit"
          "&7- &f50% shop discount"
          "&7- &fparticle effect on join"
          ""
          "&7Get VIP at &e/ame_donate&7."
        ]
      }
      ${buttonBack} { slot: 18, click { openMenu: "ame_faq" } }
    ]
  }

  # Answer 3 - Reporting players
  ame_faq_a3 {
    title: "&6FAQ - Reporting"
    size: 3
    items: [
      ${borderBlack} { slot: "0-8" }
      ${borderBlack} { slot: "18-26" }
      {
        slot: 13
        material: BARRIER
        name: "&cReporting players"
        lore: [
          "&7Use &e/report <name> <reason>&7"
          "&7or post in our Discord at"
          "&7&fhttps://discord.gg/example"
          ""
          "&7Include screenshots if possible."
          "&7Staff respond within a few hours."
        ]
      }
      ${buttonBack} { slot: 18, click { openMenu: "ame_faq" } }
    ]
  }

}
