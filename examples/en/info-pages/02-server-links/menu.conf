# Server Links - external links via openBook
# Docs: https://abstractmenus.github.io/docs/en/examples/info-pages/server-links
# Open: /ame_links
# Requires: -

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Useful Links"
size: 3

activators {
  command: "ame_links"
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # Header
  {
    slot: 4
    material: WRITTEN_BOOK
    name: "&6&lMyTestServer Resources"
    lore: ["&7Click any tile for the link.", "&7Books open clickable URLs."]
  }

  # Discord - opens a written book with the invite URL.
  {
    slot: 11
    material: PURPLE_DYE
    name: "&5Discord"
    lore: ["&7Join our Discord server.", "", "&aClick to open the link"]
    click {
      actions {
        openBook {
          author: "MyTestServer"
          title: "&5Discord"
          pages: [
            "Click the link below to open our Discord invite:\n\nhttps://discord.gg/example"
          ]
        }
        sound: ${clickSound}
        closeMenu: true
      }
    }
  }

  # Website
  {
    slot: 13
    material: COMPASS
    name: "&aWebsite"
    lore: ["&7Visit our website.", "", "&aClick to open the link"]
    click {
      actions {
        openBook {
          author: "MyTestServer"
          title: "&aWebsite"
          pages: [
            "Click the link below to visit our site:\n\nhttps://example.org"
          ]
        }
        sound: ${clickSound}
        closeMenu: true
      }
    }
  }

  # GitHub / source
  {
    slot: 15
    material: WRITABLE_BOOK
    name: "&8GitHub"
    lore: ["&7Source code and issue tracker.", "", "&aClick to open the link"]
    click {
      actions {
        openBook {
          author: "MyTestServer"
          title: "&8GitHub"
          pages: [
            "Click the link below to open our GitHub:\n\nhttps://github.com/example"
          ]
        }
        sound: ${clickSound}
        closeMenu: true
      }
    }
  }

  ${buttonClose} { slot: 22 }
]
