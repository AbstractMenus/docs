# Multi-Category Shop - hub + sub-shops navigation pattern
# Docs: https://abstractmenus.github.io/docs/en/examples/shops/paginated-shop
# Open: /ame_shop
# Requires: Vault

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

menus {

  # Main hub: lands here from /ame_shop. Tiles open sub-shops.
  ame_shop {
    title: "&6Items Shop"
    size: 1

    activators {
      command: "ame_shop"
    }

    items: [
      {
        slot: 2
        material: BREAD
        name: "&aFood"
        lore: ["&7Bread, apples, golden carrots."]
        click {
          openMenu: "ame_shop_food"
        }
      }
      {
        slot: 6
        material: IRON_PICKAXE
        name: "&aTools"
        lore: ["&7Pickaxes, axes, shovels."]
        flags: HIDE_ATTRIBUTES
        click {
          openMenu: "ame_shop_tools"
        }
      }
      ${buttonClose} { slot: 8 }
    ]
  }

  # Food sub-shop: 4 items demonstrating the buy pattern.
  # The pattern repeats for any other category - just copy this menu and swap items.
  ame_shop_food {
    title: "&6Shop > Food"
    size: 3

    items: [
      ${borderBlack} { slot: "0-8" }
      ${borderBlack} { slot: "18-25" }

      {
        slot: 10
        material: APPLE
        count: 16
        name: "&aApple x16"
        lore: ["", "&ePrice: &a$50", "", "&8Click to buy"]
        click {
          rules { money: 50 }
          actions {
            takeMoney: 50
            itemAdd { material: APPLE, count: 16 }
            sound: ${successSound}
          }
          denyActions: ${denyNoMoney}
        }
      }
      {
        slot: 12
        material: BREAD
        count: 8
        name: "&aBread x8"
        lore: ["", "&ePrice: &a$60", "", "&8Click to buy"]
        click {
          rules { money: 60 }
          actions {
            takeMoney: 60
            itemAdd { material: BREAD, count: 8 }
            sound: ${successSound}
          }
          denyActions: ${denyNoMoney}
        }
      }
      {
        slot: 14
        material: COOKED_BEEF
        count: 8
        name: "&aSteak x8"
        lore: ["", "&ePrice: &a$120", "", "&8Click to buy"]
        click {
          rules { money: 120 }
          actions {
            takeMoney: 120
            itemAdd { material: COOKED_BEEF, count: 8 }
            sound: ${successSound}
          }
          denyActions: ${denyNoMoney}
        }
      }
      {
        slot: 16
        material: GOLDEN_CARROT
        count: 4
        name: "&6Golden Carrot x4"
        lore: ["", "&ePrice: &a$300", "", "&8Click to buy"]
        click {
          rules { money: 300 }
          actions {
            takeMoney: 300
            itemAdd { material: GOLDEN_CARROT, count: 4 }
            sound: ${successSound}
          }
          denyActions: ${denyNoMoney}
        }
      }

      # Back to the main hub
      {
        slot: 26
        material: ARROW
        name: "&eBack"
        lore: ["&7Return to the main shop"]
        click {
          openMenu: "ame_shop"
        }
      }
    ]
  }

  # Tools sub-shop: 3 items showcasing flags + higher prices.
  ame_shop_tools {
    title: "&6Shop > Tools"
    size: 3

    items: [
      ${borderBlack} { slot: "0-8" }
      ${borderBlack} { slot: "18-25" }

      {
        slot: 11
        material: STONE_PICKAXE
        name: "&aStone Pickaxe"
        lore: ["", "&ePrice: &a$200", "", "&8Click to buy"]
        flags: HIDE_ATTRIBUTES
        click {
          rules { money: 200 }
          actions {
            takeMoney: 200
            itemAdd { material: STONE_PICKAXE }
            sound: ${successSound}
          }
          denyActions: ${denyNoMoney}
        }
      }
      {
        slot: 13
        material: IRON_PICKAXE
        name: "&aIron Pickaxe"
        lore: ["", "&ePrice: &a$800", "", "&8Click to buy"]
        flags: HIDE_ATTRIBUTES
        click {
          rules { money: 800 }
          actions {
            takeMoney: 800
            itemAdd { material: IRON_PICKAXE }
            sound: ${successSound}
          }
          denyActions: ${denyNoMoney}
        }
      }
      {
        slot: 15
        material: DIAMOND_PICKAXE
        name: "&bDiamond Pickaxe"
        lore: ["", "&ePrice: &a$3000", "", "&8Click to buy"]
        flags: HIDE_ATTRIBUTES
        click {
          rules { money: 3000 }
          actions {
            takeMoney: 3000
            itemAdd { material: DIAMOND_PICKAXE }
            sound: ${successSound}
          }
          denyActions: ${denyNoMoney}
        }
      }

      {
        slot: 26
        material: ARROW
        name: "&eBack"
        lore: ["&7Return to the main shop"]
        click {
          openMenu: "ame_shop"
        }
      }
    ]
  }

}
