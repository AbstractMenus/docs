# Sell-and-Buy Shop - left-click buys, right-click sells
# Docs: https://abstractmenus.github.io/docs/en/examples/shops/sell-and-buy-shop
# Open: /ame_buysell
# Requires: Vault

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Trader"
size: 3

activators {
  command: "ame_buysell"
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # Wheat - left-click buys 16 for $20, right-click sells 16 for $15.
  {
    slot: 11
    material: WHEAT
    count: 16
    name: "&6Wheat &8(stack of 16)"
    lore: [
      "&7Buy:  &a$20"
      "&7Sell: &a$15"
      ""
      "&aLeft-click  - buy"
      "&cRight-click - sell"
    ]
    click {
      left {
        rules { money: 20 }
        actions {
          takeMoney: 20
          itemAdd { material: WHEAT, count: 16 }
          sound: ${successSound}
          message: "&aBought 16 wheat for $20."
        }
        denyActions: ${denyNoMoney}
      }
      right {
        rules { inventoryItems: [{ material: WHEAT, count: 16 }] }
        actions {
          itemRemove: [{ material: WHEAT, count: 16 }]
          giveMoney: 15
          sound: ${successSound}
          message: "&aSold 16 wheat for $15."
        }
        denyActions {
          sound:   ${deniedSound}
          message: "&cYou don't have 16 wheat to sell."
        }
      }
    }
  }

  # Iron - left/right with higher price tier
  {
    slot: 13
    material: IRON_INGOT
    count: 8
    name: "&fIron Ingot &8(stack of 8)"
    lore: [
      "&7Buy:  &a$80"
      "&7Sell: &a$60"
      ""
      "&aLeft-click  - buy"
      "&cRight-click - sell"
    ]
    click {
      left {
        rules { money: 80 }
        actions {
          takeMoney: 80
          itemAdd { material: IRON_INGOT, count: 8 }
          sound: ${successSound}
          message: "&aBought 8 iron ingots for $80."
        }
        denyActions: ${denyNoMoney}
      }
      right {
        rules { inventoryItems: [{ material: IRON_INGOT, count: 8 }] }
        actions {
          itemRemove: [{ material: IRON_INGOT, count: 8 }]
          giveMoney: 60
          sound: ${successSound}
          message: "&aSold 8 iron ingots for $60."
        }
        denyActions {
          sound:   ${deniedSound}
          message: "&cYou don't have 8 iron ingots to sell."
        }
      }
    }
  }

  # Diamond - bigger spread for valuables
  {
    slot: 15
    material: DIAMOND
    name: "&bDiamond"
    lore: [
      "&7Buy:  &a$500"
      "&7Sell: &a$350"
      ""
      "&aLeft-click  - buy"
      "&cRight-click - sell"
    ]
    click {
      left {
        rules { money: 500 }
        actions {
          takeMoney: 500
          itemAdd { material: DIAMOND }
          sound: ${successSound}
          message: "&aBought 1 diamond for $500."
        }
        denyActions: ${denyNoMoney}
      }
      right {
        rules { inventoryItems: [{ material: DIAMOND, count: 1 }] }
        actions {
          itemRemove: [{ material: DIAMOND, count: 1 }]
          giveMoney: 350
          sound: ${successSound}
          message: "&aSold 1 diamond for $350."
        }
        denyActions {
          sound:   ${deniedSound}
          message: "&cYou don't have a diamond to sell."
        }
      }
    }
  }

  ${buttonClose} { slot: 22 }
]
