# Rank-Gated Shop - dual-item HAS/NO_PERM display pattern
# Docs: https://abstractmenus.github.io/docs/en/examples/shops/rank-gated-shop
# Open: /ame_rank_shop
# Requires: Vault, LuckPerms (or any permissions provider)

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Rank Shop"
size: 3

activators {
  command: "ame_rank_shop"
}

# Reusable click handler for the VIP-discount line - takes the discounted price.
discountClick {
  rules { money: 50 }
  actions {
    takeMoney: 50
    itemAdd { material: GOLDEN_APPLE }
    sound: ${successSound}
    message: "&aPurchased with VIP discount."
  }
  denyActions: ${denyNoMoney}
}

# Reusable click handler for the regular price.
regularClick {
  rules { money: 100 }
  actions {
    takeMoney: 100
    itemAdd { material: GOLDEN_APPLE }
    sound: ${successSound}
    message: "&aPurchased at regular price."
  }
  denyActions: ${denyNoMoney}
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # ========== Golden Apple - dual variants by VIP permission ==========

  # VIP variant: discounted, shown only to VIP players.
  {
    slot: 13
    material: GOLDEN_APPLE
    name: "&6Golden Apple &8(&aVIP price&8)"
    lore: [
      "&7Premium fruit."
      ""
      "&ePrice: &a$50 &m$100"
      "&8(VIP 50% discount)"
      ""
      "&aClick to buy"
    ]
    rules { permission: "abstractmenus.vip" }
    click: ${discountClick}
  }

  # Regular variant: full price, shown to everyone else (no rules = always visible,
  # but shadowed by the VIP variant when VIP rule passes).
  {
    slot: 13
    material: GOLDEN_APPLE
    name: "&6Golden Apple"
    lore: [
      "&7Premium fruit."
      ""
      "&ePrice: &a$100"
      ""
      "&aClick to buy"
      "&8VIP rank gives 50% off."
    ]
    click: ${regularClick}
  }

  ${buttonClose} { slot: 22 }
]
