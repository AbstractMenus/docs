# Cake Shop - basic shop example
# Docs: https://abstractmenus.github.io/docs/en/examples/shops/cake-shop
# Open: /ame_cake_shop
# Requires: Vault

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Cake Shop"
size: 3

activators {
  command: "ame_cake_shop"
}

items: [
  # Top and bottom borders, using a shared template + slot range
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # Decorative header in the middle of the top row
  ${commonHeader} { slot: 4 }

  # Buy a single cake for $100
  {
    slot: 11
    material: CAKE
    name: "&6Sweet Cake"
    lore: [
      "&7A delicious cake."
      ""
      "&ePrice: &a$100"
      ""
      "&8Click to buy"
    ]
    click {
      rules { money: 100 }
      actions {
        takeMoney: 100
        itemAdd { material: CAKE }
        sound: ${successSound}
        message: "&aYou bought a Cake!"
      }
      denyActions: ${denyNoMoney}
    }
  }

  # Buy 4 cookies for $25
  {
    slot: 13
    material: COOKIE
    count: 4
    name: "&6Cookie x4"
    lore: [
      "&7A pack of four cookies."
      ""
      "&ePrice: &a$25"
      ""
      "&8Click to buy"
    ]
    click {
      rules { money: 25 }
      actions {
        takeMoney: 25
        itemAdd {
          material: COOKIE
          count: 4
        }
        sound: ${successSound}
        message: "&aYou bought 4 Cookies!"
      }
      denyActions: ${denyNoMoney}
    }
  }

  # Buy a pumpkin pie for $60
  {
    slot: 15
    material: PUMPKIN_PIE
    name: "&6Pumpkin Pie"
    lore: [
      "&7A seasonal favorite."
      ""
      "&ePrice: &a$60"
      ""
      "&8Click to buy"
    ]
    click {
      rules { money: 60 }
      actions {
        takeMoney: 60
        itemAdd { material: PUMPKIN_PIE }
        sound: ${successSound}
        message: "&aYou bought a Pumpkin Pie!"
      }
      denyActions: ${denyNoMoney}
    }
  }

  # Close button
  ${buttonClose} { slot: 22 }
]
