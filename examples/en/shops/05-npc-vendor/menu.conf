# NPC Vendor - shop opened by clicking a Citizens NPC
# Docs: https://abstractmenus.github.io/docs/en/examples/shops/npc-vendor
# Open: right-click the Citizens NPC with id 1 (replace with your NPC's id)
# Requires: Citizens, Vault

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Trader %activator_npc_name%"
size: 3

activators {
  clickNPC: [1]
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  {
    slot: 4
    material: EMERALD
    name: "&aWelcome, traveler"
    lore: ["&7Buy goods from %activator_npc_name%."]
  }

  {
    slot: 11
    material: BREAD
    count: 8
    name: "&6Bread x8"
    lore: ["&ePrice: &a$30"]
    click {
      rules { money: 30 }
      actions {
        takeMoney: 30
        itemAdd { material: BREAD, count: 8 }
        sound: ${successSound}
      }
      denyActions: ${denyNoMoney}
    }
  }
  {
    slot: 13
    material: COOKED_BEEF
    count: 4
    name: "&6Steak x4"
    lore: ["&ePrice: &a$50"]
    click {
      rules { money: 50 }
      actions {
        takeMoney: 50
        itemAdd { material: COOKED_BEEF, count: 4 }
        sound: ${successSound}
      }
      denyActions: ${denyNoMoney}
    }
  }
  {
    slot: 15
    material: GOLDEN_APPLE
    name: "&6Golden Apple"
    lore: ["&ePrice: &a$200"]
    click {
      rules { money: 200 }
      actions {
        takeMoney: 200
        itemAdd { material: GOLDEN_APPLE }
        sound: ${successSound}
      }
      denyActions: ${denyNoMoney}
    }
  }

  ${buttonClose} { slot: 22 }
]
