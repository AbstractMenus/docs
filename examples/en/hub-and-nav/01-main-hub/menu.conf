# Main Hub - launcher for the example pack
# Docs: https://abstractmenus.github.io/docs/en/examples/hub-and-nav/main-hub
# Open: /ame_hub
# Requires: -

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Example Pack - Main Hub"
size: 3

activators {
  command: "ame_hub"
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # Header
  {
    slot: 4
    material: NETHER_STAR
    name: "&6&lAbstractMenus Example Pack"
    lore: ["&7Click any tile to open that example."]
  }

  # Shops
  {
    slot: 10
    material: CAKE
    name: "&aCake Shop"
    lore: ["&7A minimal money + itemAdd shop.", "", "&8Opens /ame_cake_shop"]
    click {
      openMenu: "ame_cake_shop"
    }
  }

  {
    slot: 11
    material: BREAD
    name: "&aMulti-Category Shop"
    lore: ["&7Hub + sub-shops navigation.", "", "&8Opens /ame_shop"]
    click {
      openMenu: "ame_shop"
    }
  }

  # State
  {
    slot: 12
    material: BOOK
    name: "&aCounter & Toggle"
    lore: ["&7Per-player vars in action.", "", "&8Opens /ame_counter"]
    click {
      openMenu: "ame_counter"
    }
  }

  # Info
  {
    slot: 13
    material: WRITTEN_BOOK
    name: "&aServer Rules"
    lore: ["&7Read-only example menu.", "", "&8Opens /ame_rules"]
    click {
      openMenu: "ame_rules"
    }
  }

  # Kits
  {
    slot: 14
    material: CHEST
    name: "&aBasic Kit"
    lore: ["&7One-click reward bundle.", "", "&8Opens /ame_kit"]
    click {
      openMenu: "ame_kit"
    }
  }

  ${buttonClose} { slot: 22 }
]
