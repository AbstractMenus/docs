# Breadcrumb Chain - 3 nested menus using openMenuCtx for dynamic back navigation
# Docs: https://abstractmenus.github.io/docs/en/examples/hub-and-nav/breadcrumb-chain
# Open: /ame_chain
# Requires: -

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

menus {

  # Level 1
  ame_chain_l1 {
    title: "&6Level 1"
    size: 1
    activators { command: "ame_chain" }
    items: [
      {
        slot: 4
        material: BLUE_WOOL
        name: "&aGo deeper"
        lore: ["&7Open Level 2."]
        click { openMenu: "ame_chain_l2" }
      }
      ${buttonClose} { slot: 8 }
    ]
  }

  # Level 2
  ame_chain_l2 {
    title: "&6Level 2"
    size: 1
    items: [
      {
        slot: 4
        material: GREEN_WOOL
        name: "&aGo deeper"
        lore: ["&7Open Level 3."]
        click { openMenu: "ame_chain_l3" }
      }
      {
        slot: 0
        material: ARROW
        name: "&eBack to Level 1"
        click { openMenu: "ame_chain_l1" }
      }
    ]
  }

  # Level 3
  ame_chain_l3 {
    title: "&6Level 3 (deepest)"
    size: 1
    items: [
      {
        slot: 4
        material: GOLD_BLOCK
        name: "&6You reached the bottom"
        lore: [
          "&7There's no Level 4."
          "&7Use the back arrow to climb out."
        ]
      }
      {
        slot: 0
        material: ARROW
        name: "&eBack to Level 2"
        click { openMenu: "ame_chain_l2" }
      }
    ]
  }

}
