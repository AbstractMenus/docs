# Sub-Hub - secondary hub with a back button to the main hub
# Docs: https://abstractmenus.github.io/docs/en/examples/hub-and-nav/sub-hub
# Open: /ame_subhub  OR  click the "Other" tile in the main hub
# Requires: -

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Other Features"
size: 3

activators {
  command: "ame_subhub"
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # Header
  {
    slot: 4
    material: NETHER_STAR
    name: "&6&lOther Features"
    lore: ["&7Things that didn't fit on the main hub."]
  }

  # Tag chooser
  {
    slot: 11
    material: PAPER
    name: "&aTags"
    lore: ["&7Pick a chat tag.", "", "&8Opens /ame_tags"]
    click { openMenu: "ame_tags" }
  }

  # Roulette
  {
    slot: 13
    material: NETHER_STAR
    name: "&aRoulette"
    lore: ["&7Try your luck.", "", "&8Opens /ame_roulette"]
    click { openMenu: "ame_roulette" }
  }

  # Vote
  {
    slot: 15
    material: BEACON
    name: "&aDaily vote"
    lore: ["&7Vote and earn rewards.", "", "&8Opens /ame_vote"]
    click { openMenu: "ame_vote" }
  }

  # Back to main hub
  {
    slot: 18
    material: ARROW
    name: "&eBack to Main Hub"
    lore: ["&7Return to /ame_hub."]
    click { openMenu: "ame_hub" }
  }

  ${buttonClose} { slot: 22 }
]
