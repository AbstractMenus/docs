# AbstractMenus example pack - shared templates (RU)
# Reusable HOCON snippets referenced from menus via ${blockName} substitution.
# Docs: https://abstractmenus.github.io/docs/ru/examples

# Sound presets (Paper 1.21+ registry keys)
clickSound:    "ui.button.click"
openSound:     "block.chest.open"
closeSound:    "block.chest.close"
successSound:  "entity.experience_orb.pickup"
failSound:     "block.note_block.bass"
deniedSound:   "block.anvil.land"

# Deny action snippets (use as: denyActions: ${denyNoMoney})
denyNoMoney {
  sound:   ${deniedSound}
  message: "&cУ вас недостаточно денег."
}
denyNoPerm {
  sound:   ${deniedSound}
  message: "&cНет прав."
}
denyCooldown {
  sound:   ${deniedSound}
  message: "&cВы на кулдауне. Попробуйте позже."
}

# Border items (use as: ${borderBlack} { slot: "0-8" })
borderBlack {
  material: BLACK_STAINED_GLASS_PANE
  name: " "
}
borderGray {
  material: GRAY_STAINED_GLASS_PANE
  name: " "
}
borderBlue {
  material: BLUE_STAINED_GLASS_PANE
  name: " "
}

# Navigation buttons (use as: ${buttonClose} { slot: 22 })
buttonClose {
  material: BARRIER
  name: "&cЗакрыть"
  click {
    closeMenu: true
  }
}
buttonBack {
  material: ARROW
  name: "&eНазад"
  lore: ["&7Вернуться в предыдущее меню"]
  click {
    closeMenu: true
  }
}
buttonNext {
  material: ARROW
  name: "&eСледующая страница"
  click {
    pageNext: 1
  }
}
buttonPrev {
  material: ARROW
  name: "&eПредыдущая страница"
  click {
    pagePrev: 1
  }
}

# Rule shortcut snippets (use as: rules: ${rulesAdmin})
rulesAdmin   { permission: "abstractmenus.admin" }
rulesVip     { permission: "abstractmenus.vip" }
rulesDonator { permission: "abstractmenus.donator" }

# Common decorative header (use as: ${commonHeader} { slot: 4 })
commonHeader {
  material: NETHER_STAR
  name: "&6&lМеню примера"
  lore: ["&7Добро пожаловать в пак примеров AbstractMenus"]
}
