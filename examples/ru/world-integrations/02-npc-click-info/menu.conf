# Клик по NPC - информационное меню о Citizens NPC, на которого кликнул игрок
# Документация: https://abstractmenus.github.io/docs/ru/examples/world-integrations/npc-click-info
# Открыть: правый клик по любому Citizens NPC с id 1, 2 или 3
# Требует: Citizens

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6NPC: %activator_npc_name%"
size: 3

activators {
  clickNPC: [1, 2, 3]
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # Заголовок берёт данные из контекста NPC
  {
    slot: 4
    material: PLAYER_HEAD
    skullOwner: "%activator_npc_name%"
    name: "&6%activator_npc_name%"
    lore: [
      "&7Citizens NPC #&f%activator_npc_id%"
      "&7Мир: &f%activator_npc_world%"
      ""
      "&7Кликните по любой плитке ниже для действия."
    ]
  }

  # Универсальные действия для любого клика по NPC
  {
    slot: 11
    material: PAPER
    name: "&aПоздороваться"
    lore: ["&7Заставить этого NPC поздороваться."]
    click {
      actions {
        message: "&e[%activator_npc_name%] &fПривет, %player_name%!"
        sound: ${clickSound}
      }
    }
  }
  {
    slot: 13
    material: COMPASS
    name: "&aПоказать местоположение"
    lore: ["&7Вывести координаты этого NPC."]
    click {
      actions {
        message: "&e[%activator_npc_name%] &fЯ нахожусь в %activator_npc_world% у NPC с id %activator_npc_id%."
        sound: ${clickSound}
      }
    }
  }
  {
    slot: 15
    material: EMERALD
    name: "&aПоговорить с торговцем"
    lore: ["&7Открыть магазин этого NPC, если он есть."]
    click {
      actions {
        # В реальной настройке вы бы направляли конкретных NPC в конкретные меню магазинов.
        # Демо просто открывает обобщённый магазин торговца.
        openMenu: "ame_shop"
      }
    }
  }

  ${buttonClose} { slot: 22 }
]
