# Приветствие региона - встречаем игроков, входящих в регион WorldGuard
# Документация: https://abstractmenus.github.io/docs/ru/examples/world-integrations/region-welcome
# Открыть: автоматически при входе в регион "spawn"
# Требует: WorldGuard

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Добро пожаловать на спавн"
size: 3

activators {
  regionJoin: ["spawn"]
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # Приветственный баннер
  {
    slot: 4
    material: NETHER_STAR
    name: "&6&lДобро пожаловать на MyTestServer"
    lore: [
      "&7Вы вошли в регион &fSpawn&7."
      ""
      "&7Продолжайте с того места, где остановились."
    ]
  }

  # Быстрые ссылки
  {
    slot: 11
    material: COMPASS
    name: "&aОткрыть главный хаб"
    lore: ["&7Просмотреть все доступные меню."]
    click {
      openMenu: "ame_hub"
    }
  }
  {
    slot: 13
    material: WRITTEN_BOOK
    name: "&aПравила сервера"
    lore: ["&7Прочитайте правила перед игрой."]
    click {
      openMenu: "ame_rules"
    }
  }
  {
    slot: 15
    material: CHEST
    name: "&aПолучить стартовый кит"
    lore: ["&7Бесплатные предметы для новых игроков."]
    click {
      openMenu: "ame_kit"
    }
  }

  ${buttonClose} { slot: 22 }
]
