# Энхансер предметов - drag-and-drop с условной трансформацией через правило oneof
# Docs: https://abstractmenus.github.io/docs/ru/examples/state-and-vars/item-enhancer
# Open: /ame_enhancer
# Requires: -

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Энхансер предметов"
size: 1

activators {
  command: "ame_enhancer"
}

# Слоты 2 (вход) и 6 (результат) - drag-and-drop. Слот 4 - кнопка триггера.
draggable: [
  "--x---x--"
]

# Заглушка для слота результата при открытии меню или невалидном вводе.
resultStub {
  slot: 6
  material: WHITE_STAINED_GLASS_PANE
  name: "&7Результат"
}

# Переиспользуемые блоки
inputSlotRule { slot: 2 }
outputAction  { slot: 6, count: "%changed_item_amount%" }

# Таблица трансформаций: каждая запись связывает правило "положенный предмет совпадает с X"
# с действием, которое выдаёт результат Y. `oneof` короткозамыкается на первом совпадении -
# выигрывает первая подходящая трансформация.
enhanceRules {
  oneof: [
    {
      placedItem: ${inputSlotRule} { material: STONE }
      actions { placeItem: ${outputAction} { material: COAL_ORE } }
    }
    {
      placedItem: ${inputSlotRule} { material: APPLE }
      actions { placeItem: ${outputAction} { material: GOLDEN_APPLE } }
    }
    {
      placedItem: ${inputSlotRule} { material: WOODEN_SWORD }
      actions { placeItem: ${outputAction} { material: DIAMOND_SWORD } }
    }
    {
      placedItem: ${inputSlotRule} { material: WOODEN_AXE }
      actions { placeItem: ${outputAction} { material: DIAMOND_AXE } }
    }
  ]
}

items: [
  # Декоративные стёкла вокруг drag-and-drop слотов
  {
    slot: [ "xx-x-x-x-" ]
    material: BLACK_STAINED_GLASS_PANE
    name: " "
  }

  # Заглушка слота результата по умолчанию
  ${resultStub}

  # Карточка с рецептами
  {
    slot: 8
    material: NAME_TAG
    name: "&aРецепты"
    lore: [
      "&fКамень &7-> &bУгольная руда"
      "&fЯблоко &7-> &bЗолотое яблоко"
      "&fДеревянный меч &7-> &bАлмазный меч"
      "&fДеревянный топор &7-> &bАлмазный топор"
    ]
  }

  # Кнопка "Улучшить!"
  {
    slot: 4
    material: NETHER_STAR
    name: "&bУлучшить!"
    click {
      rules: ${enhanceRules}
      actions {
        removePlaced: 2
        sound: ${successSound}
      }
      denyActions {
        rules {
          placedItem { slot: 6, material: AIR }
        }
        actions {
          setButton: ${resultStub}
          sound: ${deniedSound}
        }
      }
    }
  }
]
