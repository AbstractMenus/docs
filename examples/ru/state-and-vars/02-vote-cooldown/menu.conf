# Кулдаун на голосование - глобальный счётчик голосов + персональный 24ч кулдаун
# Docs: https://abstractmenus.github.io/docs/ru/examples/state-and-vars/vote-cooldown
# Open: /ame_vote
# Requires: -

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Ежедневное голосование"
size: 3
updateInterval: 20

activators {
  command: "ame_vote"
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # Глобальный счётчик голосов - сколько всего голосов получил сервер.
  {
    slot: 11
    material: BEACON
    name: "&6Всего голосов на сервере"
    lore: ["", "&e%var_:ame_vote_total:0%", "", "&8(За всё время, по всем игрокам)"]
  }

  # ========== Кнопка голосования - dual-вариант ==========
  # Вариант ON COOLDOWN: персональная временная переменная задана, голосовать пока нельзя.
  {
    slot: 13
    material: GRAY_DYE
    name: "&7Голосовать (на кулдауне)"
    lore: [
      "&7Ты уже голосовал недавно."
      ""
      "&cДоступно через &e%varpt_:ame_vote_cd%"
    ]
    rules { existVarp: "ame_vote_cd" }
  }
  # Вариант READY: кулдауна нет, клик - голосуем.
  {
    slot: 13
    material: LIME_DYE
    name: "&aГолосовать!"
    lore: [
      "&7Клик - проголосовать за сервер."
      "&7Голосовать можно раз в 24 часа."
    ]
    click {
      actions {
        # Увеличиваем глобальный счётчик голосов.
        incVar: "ame_vote_total"
        # Ставим персональный кулдаун, который сам истечёт через 1 день.
        setVarp: "ame_vote_cd::1::1d"
        sound: ${successSound}
        message: "&aСпасибо за голос! Возвращайся через 24 часа."
        refreshMenu: true
      }
    }
  }

  # Информация о наградах
  {
    slot: 15
    material: DIAMOND
    name: "&bНаграды за голос"
    lore: [
      "&7Каждый голос даёт:"
      "&7- &f$100"
      "&7- &f1 vote-токен"
      "&7- &fшанс на алмазы"
      ""
      "&8Настраивается в твоём vote-обработчике"
    ]
  }

  ${buttonClose} { slot: 22 }
]
