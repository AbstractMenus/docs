# Счётчик и тоггл - демо персональных переменных
# Docs: https://abstractmenus.github.io/docs/ru/examples/state-and-vars/counter-toggle
# Open: /ame_counter
# Requires: -

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Счётчик и тоггл"
size: 3

activators {
  command: "ame_counter"
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # ========== Секция счётчика ==========
  # Сброс счётчика
  {
    slot: 10
    material: BARRIER
    name: "&cСбросить счётчик"
    lore: ["&7Клик - очистить счётчик."]
    click {
      actions {
        removeVarp: "ame_counter"
        sound: ${clickSound}
        refreshMenu: true
      }
    }
  }

  # Уменьшить
  {
    slot: 11
    material: RED_WOOL
    name: "&c-1"
    click {
      actions {
        decVarp: "ame_counter"
        sound: ${clickSound}
        refreshMenu: true
      }
    }
  }

  # Отображение счётчика - по умолчанию 0, если переменная не задана
  {
    slot: 12
    material: BOOK
    name: "&6Счётчик: &e%varp_:ame_counter:0%"
    lore: ["&7Твой персональный счётчик, сохраняется между сессиями."]
  }

  # Увеличить
  {
    slot: 13
    material: GREEN_WOOL
    name: "&a+1"
    click {
      actions {
        incVarp: "ame_counter"
        sound: ${clickSound}
        refreshMenu: true
      }
    }
  }

  # ========== Секция тоггла ==========
  # Паттерн dual-item: первый предмет рендерится, когда переменная есть,
  # второй - когда её нет.

  # Состояние ON (видно только когда переменная задана)
  {
    slot: 15
    material: LIME_DYE
    name: "&aТоггл: ВКЛ"
    lore: ["&7Клик - выключить."]
    rules { existVarp: "ame_toggle" }
    click {
      actions {
        removeVarp: "ame_toggle"
        sound: ${clickSound}
        refreshMenu: true
      }
    }
  }

  # Состояние OFF (фолбек, без правил - рендерится, когда вариант ON скрыт)
  {
    slot: 15
    material: GRAY_DYE
    name: "&7Тоггл: ВЫКЛ"
    lore: ["&7Клик - включить."]
    click {
      actions {
        setVarp: "ame_toggle::1"
        sound: ${clickSound}
        refreshMenu: true
      }
    }
  }

  ${buttonClose} { slot: 22 }
]
