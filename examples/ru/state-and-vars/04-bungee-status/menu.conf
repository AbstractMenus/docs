# Bungee Status - выбор сервера с живым онлайном через BungeeCord
# Docs: https://abstractmenus.github.io/docs/ru/examples/state-and-vars/bungee-status
# Open: /ame_servers
# Requires: BungeeCord-прокси (или Velocity) с именованными бэкендами

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Выбор сервера"
size: 3
updateInterval: 40

activators {
  command: "ame_servers"
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # Лобби
  {
    slot: 10
    material: BOOKSHELF
    name: "&e&lЛобби"
    lore: [
      "&7Главный хаб для выбора режимов."
      ""
      "&7Онлайн: &e%bungee_lobby%"
      ""
      "&a> Клик - подключиться"
    ]
    glow: true
    click {
      bungeeConnect: "lobby"
    }
  }

  # Survival
  {
    slot: 12
    material: GRASS_BLOCK
    name: "&e&lSurvival"
    lore: [
      "&7Ванильное выживание."
      ""
      "&7Онлайн: &e%bungee_survival%"
      ""
      "&a> Клик - подключиться"
    ]
    click {
      bungeeConnect: "survival"
    }
  }

  # SkyWars
  {
    slot: 14
    material: ENDER_EYE
    name: "&e&lSky Wars"
    lore: [
      "&7PvP-миниигра на островах."
      ""
      "&7Онлайн: &e%bungee_sw%"
      ""
      "&a> Клик - подключиться"
    ]
    click {
      bungeeConnect: "sw"
    }
  }

  # Build Battle
  {
    slot: 16
    material: BRICKS
    name: "&e&lBuild Battle"
    lore: [
      "&7Тематические соревнования по постройкам."
      ""
      "&7Онлайн: &e%bungee_bb%"
      ""
      "&a> Клик - подключиться"
    ]
    click {
      bungeeConnect: "bb"
    }
  }

  ${buttonClose} { slot: 22 }
]
