# Главный хаб - точка входа для примеров пака
# Docs: https://abstractmenus.github.io/docs/ru/examples/hub-and-nav/main-hub
# Открыть: /ame_hub
# Требует: -

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Пак примеров - Главный хаб"
size: 3

activators {
  command: "ame_hub"
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # Заголовок
  {
    slot: 4
    material: NETHER_STAR
    name: "&6&lПак примеров AbstractMenus"
    lore: ["&7Кликни по плитке, чтобы открыть пример."]
  }

  # Магазины
  {
    slot: 10
    material: CAKE
    name: "&aМагазин тортов"
    lore: ["&7Простой магазин с money + itemAdd.", "", "&8Открывает /ame_cake_shop"]
    click {
      openMenu: "ame_cake_shop"
    }
  }

  {
    slot: 11
    material: BREAD
    name: "&aМагазин с категориями"
    lore: ["&7Хаб + навигация по подменю.", "", "&8Открывает /ame_shop"]
    click {
      openMenu: "ame_shop"
    }
  }

  # Состояние
  {
    slot: 12
    material: BOOK
    name: "&aСчётчик и переключатель"
    lore: ["&7Переменные на игрока в действии.", "", "&8Открывает /ame_counter"]
    click {
      openMenu: "ame_counter"
    }
  }

  # Инфо
  {
    slot: 13
    material: WRITTEN_BOOK
    name: "&aПравила сервера"
    lore: ["&7Меню только для чтения.", "", "&8Открывает /ame_rules"]
    click {
      openMenu: "ame_rules"
    }
  }

  # Киты
  {
    slot: 14
    material: CHEST
    name: "&aБазовый кит"
    lore: ["&7Набор наград в один клик.", "", "&8Открывает /ame_kit"]
    click {
      openMenu: "ame_kit"
    }
  }

  ${buttonClose} { slot: 22 }
]
