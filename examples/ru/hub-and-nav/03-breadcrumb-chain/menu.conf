# Цепочка хлебных крошек - 3 вложенных меню с openMenuCtx для динамической навигации назад
# Docs: https://abstractmenus.github.io/docs/ru/examples/hub-and-nav/breadcrumb-chain
# Открыть: /ame_chain
# Требует: -

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

menus {

  # Уровень 1
  ame_chain_l1 {
    title: "&6Уровень 1"
    size: 1
    activators { command: "ame_chain" }
    items: [
      {
        slot: 4
        material: BLUE_WOOL
        name: "&aГлубже"
        lore: ["&7Открыть Уровень 2."]
        click { openMenu: "ame_chain_l2" }
      }
      ${buttonClose} { slot: 8 }
    ]
  }

  # Уровень 2
  ame_chain_l2 {
    title: "&6Уровень 2"
    size: 1
    items: [
      {
        slot: 4
        material: GREEN_WOOL
        name: "&aГлубже"
        lore: ["&7Открыть Уровень 3."]
        click { openMenu: "ame_chain_l3" }
      }
      {
        slot: 0
        material: ARROW
        name: "&eНазад на Уровень 1"
        click { openMenu: "ame_chain_l1" }
      }
    ]
  }

  # Уровень 3
  ame_chain_l3 {
    title: "&6Уровень 3 (самый глубокий)"
    size: 1
    items: [
      {
        slot: 4
        material: GOLD_BLOCK
        name: "&6Ты дошёл до дна"
        lore: [
          "&7Уровня 4 нет."
          "&7Используй стрелку назад, чтобы выбраться."
        ]
      }
      {
        slot: 0
        material: ARROW
        name: "&eНазад на Уровень 2"
        click { openMenu: "ame_chain_l2" }
      }
    ]
  }

}
