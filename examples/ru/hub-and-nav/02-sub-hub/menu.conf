# Под-хаб - вторичный хаб с кнопкой назад в главный хаб
# Docs: https://abstractmenus.github.io/docs/ru/examples/hub-and-nav/sub-hub
# Открыть: /ame_subhub  ИЛИ  кликнуть по плитке "Прочее" в главном хабе
# Требует: -

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Прочие возможности"
size: 3

activators {
  command: "ame_subhub"
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # Заголовок
  {
    slot: 4
    material: NETHER_STAR
    name: "&6&lПрочие возможности"
    lore: ["&7То, что не поместилось в главный хаб."]
  }

  # Выбор тегов
  {
    slot: 11
    material: PAPER
    name: "&aТеги"
    lore: ["&7Выбери тег для чата.", "", "&8Открывает /ame_tags"]
    click { openMenu: "ame_tags" }
  }

  # Рулетка
  {
    slot: 13
    material: NETHER_STAR
    name: "&aРулетка"
    lore: ["&7Испытай удачу.", "", "&8Открывает /ame_roulette"]
    click { openMenu: "ame_roulette" }
  }

  # Голосование
  {
    slot: 15
    material: BEACON
    name: "&aЕжедневное голосование"
    lore: ["&7Голосуй и получай награды.", "", "&8Открывает /ame_vote"]
    click { openMenu: "ame_vote" }
  }

  # Назад в главный хаб
  {
    slot: 18
    material: ARROW
    name: "&eНазад в главный хаб"
    lore: ["&7Вернуться к /ame_hub."]
    click { openMenu: "ame_hub" }
  }

  ${buttonClose} { slot: 22 }
]
