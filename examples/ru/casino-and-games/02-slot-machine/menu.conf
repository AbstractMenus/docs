# Слот-машина - 3 барабана с независимой анимацией и случайным результатом
# Docs: https://abstractmenus.github.io/docs/ru/examples/casino-and-games/slot-machine
# Open: /ame_slots
# Requires: Vault

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Слот-машина"
size: 3

activators {
  command: "ame_slots"
}

# Статичные предметы - рамки, заголовок, подпись со стоимостью. Кадры рисуются поверх барабанов.
items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  {
    slot: 4
    material: GOLD_INGOT
    name: "&6Слот-машина"
    lore: ["&7Стоимость прокрута: &a$50", "&7Соберите три одинаковых - получите крупный выигрыш."]
  }

  ${buttonClose} { slot: 22 }
]

# После последнего кадра randActions выдаёт приз. Четыре исхода соответствуют
# (примерно) тому, что игрок видел во время прокрута.
onAnimEnd {
  randActions: [
    # 60% мимо
    { sound: ${failSound},    message: "&7Не сошлось. -$50" }
    { sound: ${failSound},    message: "&7Не сошлось. -$50" }
    { sound: ${failSound},    message: "&7Не сошлось. -$50" }
    # 30% небольшой выигрыш
    { sound: ${successSound}, message: "&aТри вишни! +$80",       giveMoney: 80  }
    # 8% средний выигрыш
    { sound: ${successSound}, message: "&6Три колокольчика! +$200",         giveMoney: 200 }
    # 2% джекпот
    { sound: ${successSound}, message: "&dДЖЕКПОТ! Три семёрки! +$1000", giveMoney: 1000 }
  ]
}

# Три барабана в слотах 11, 13, 15. Каждый прокручивает 5 символов с замедлением.
# Кадры рисуют все три одновременно - визуально барабаны крутятся синхронно,
# для демо этого достаточно. Чтобы каждый барабан крутился отдельно, понадобились
# бы отдельные анимированные меню или код в расширении.
frames: [
  { delay: 2, clear: false, items: [
    { slot: 11, material: APPLE,         name: "&c?" }
    { slot: 13, material: GOLD_INGOT,    name: "&6?" }
    { slot: 15, material: DIAMOND,       name: "&b?" }
  ]}
  { delay: 2, clear: false, items: [
    { slot: 11, material: GOLD_INGOT,    name: "&6?" }
    { slot: 13, material: DIAMOND,       name: "&b?" }
    { slot: 15, material: NETHER_STAR,   name: "&e?" }
  ]}
  { delay: 2, clear: false, items: [
    { slot: 11, material: DIAMOND,       name: "&b?" }
    { slot: 13, material: NETHER_STAR,   name: "&e?" }
    { slot: 15, material: APPLE,         name: "&c?" }
  ]}
  { delay: 4, clear: false, items: [
    { slot: 11, material: NETHER_STAR,   name: "&e?" }
    { slot: 13, material: APPLE,         name: "&c?" }
    { slot: 15, material: GOLD_INGOT,    name: "&6?" }
  ]}
  { delay: 8, clear: false, items: [
    { slot: 11, material: APPLE,         name: "&c?" }
    { slot: 13, material: APPLE,         name: "&c?" }
    { slot: 15, material: APPLE,         name: "&c?" }
  ]}
  { delay: 20, clear: false, items: [
    { slot: 11, material: NETHER_STAR,   name: "&eИТОГ" }
    { slot: 13, material: NETHER_STAR,   name: "&eИТОГ" }
    { slot: 15, material: NETHER_STAR,   name: "&eИТОГ" }
  ]}
]
