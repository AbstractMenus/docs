# Случайный зачарователь - drag-and-drop + лотерея зачарований через randActions
# Docs: https://abstractmenus.github.io/docs/ru/examples/casino-and-games/enchanter
# Open: /ame_enchanter
# Requires: -

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Случайный зачарователь"
size: 3

activators {
  command: "ame_enchanter"
}

# Помечаем, какие слоты принимают drag-and-drop. Слот 11 (вход) и слот 15 (результат).
# `x` - drag-and-drop, `-` - обычный.
draggable: [
  "---------"
  "--x---x--"
  "---------"
]

# Заглушка по умолчанию для слота результата, пока ничего не зачаровано.
resultStub {
  slot: 15
  material: WHITE_STAINED_GLASS_PANE
  name: "&7Результат"
  lore: ["&8(пусто)"]
}

# Шаблон действия: положить перетащенный предмет обратно в слот 15 с выбранным зачарованием.
# Плейсхолдеры %changed_item_*% ссылаются на то, что игрок положил в слот 11.
placeItemBase {
  slot: 15
  serialized: "%changed_item_serialized%"
  count: "%changed_item_amount%"
}

# Полный блок click для кнопки зачарования. Вынесен отдельно, чтобы не загромождать список items.
enchantClick {
  rules {
    # Слот 11 НЕ должен быть пустым (префикс - инвертирует правило placedItem).
    -placedItem {
      slot: 11
      material: AIR
    }
  }
  actions {
    randActions: [
      { placeItem: ${placeItemBase} { enchantments { sharpness: 1, unbreaking: 2 } } }
      { placeItem: ${placeItemBase} { enchantments { efficiency: 2              } } }
      { placeItem: ${placeItemBase} { enchantments { fortune: 2,   unbreaking: 1 } } }
      { placeItem: ${placeItemBase} { enchantments { fire_aspect: 1              } } }
    ]
    # Убираем входной предмет из слота 11 (он "израсходован").
    removePlaced: 11
    sound: ${successSound}
  }
  # При клике с пустым входным слотом возвращаем заглушку в слот результата.
  denyActions {
    rules {
      placedItem {
        slot: 15
        material: AIR
      }
    }
    actions {
      setButton: ${resultStub}
      sound: ${deniedSound}
    }
  }
}

items: [
  # Декоративная рамка вокруг двух drag-and-drop слотов
  {
    slot: [
      "xxxxxxxxx"
      "xx-xxx-xx"
      "xxxxxxxxx"
    ]
    material: BLACK_STAINED_GLASS_PANE
    name: " "
  }

  # Заглушка пустого слота результата
  ${resultStub}

  # Кнопка "Зачаровать!" в слоте 22 (нижний ряд, по центру)
  {
    slot: 22
    material: NETHER_STAR
    name: "&bЗачаровать!"
    lore: [
      "&7Положите инструмент в левый слот,"
      "&7затем кликните сюда, чтобы навесить"
      "&7случайное зачарование."
    ]
    click: ${enchantClick}
  }
]
