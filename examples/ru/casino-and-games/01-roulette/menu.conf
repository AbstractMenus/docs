# Рулетка - анимация замедления из 8 кадров + случайный приз через randActions
# Docs: https://abstractmenus.github.io/docs/ru/examples/casino-and-games/roulette
# Open: /ame_roulette
# Requires: -

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Рулетка"
size: 1

activators {
  command: "ame_roulette"
}

# Статичные предметы, которые видны во всех кадрах. clear: false на кадрах оставляет их на месте.
items: [
  ${borderBlack} { slot: 0 }
  ${borderBlack} { slot: 1 }
  ${borderBlack} { slot: 2 }
  ${borderBlack} { slot: 6 }
  ${borderBlack} { slot: 7 }
  ${buttonClose} { slot: 8 }
]

# Случайный приз, выдаётся после завершения вращения.
onAnimEnd {
  randActions: [
    {
      sound: ${successSound}
      itemAdd { material: DIAMOND, count: 1 }
      message: "&bВы выиграли 1 алмаз!"
    }
    {
      sound: ${successSound}
      itemAdd { material: EMERALD, count: 2 }
      message: "&aВы выиграли 2 изумруда!"
    }
    {
      sound: ${successSound}
      itemAdd { material: GOLD_INGOT, count: 4 }
      message: "&6Вы выиграли 4 золотых слитка!"
    }
    {
      sound: ${failSound}
      message: "&7В следующий раз повезёт."
    }
  ]
}

# Кадры анимации. У каждого clear: false, чтобы статичные предметы не пропадали.
# Задержки растут к концу - получается ощущение замедления.
frames: [
  { delay: 2,  clear: false, items: [ { slot: 4, material: DIAMOND,    name: "&b?" } ] }
  { delay: 2,  clear: false, items: [ { slot: 4, material: EMERALD,    name: "&a?" } ] }
  { delay: 2,  clear: false, items: [ { slot: 4, material: GOLD_INGOT, name: "&6?" } ] }
  { delay: 2,  clear: false, items: [ { slot: 4, material: DIAMOND,    name: "&b?" } ] }
  { delay: 4,  clear: false, items: [ { slot: 4, material: EMERALD,    name: "&a?" } ] }
  { delay: 6,  clear: false, items: [ { slot: 4, material: GOLD_INGOT, name: "&6?" } ] }
  { delay: 10, clear: false, items: [ { slot: 4, material: DIAMOND,    name: "&b?" } ] }
  { delay: 20, clear: false, items: [ { slot: 4, material: NETHER_STAR, name: "&e?" } ] }
]
