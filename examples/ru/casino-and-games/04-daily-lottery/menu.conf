# Ежедневная лотерея - глобальный накопитель джекпота + выплата по шансу
# Docs: https://abstractmenus.github.io/docs/ru/examples/casino-and-games/daily-lottery
# Open: /ame_lottery
# Requires: Vault

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Ежедневная лотерея"
size: 3
updateInterval: 40

activators {
  command: "ame_lottery"
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # Отображение джекпота - читает глобальную переменную-накопитель
  {
    slot: 4
    material: NETHER_STAR
    name: "&6&lТекущий джекпот"
    lore: ["", "&e$%var_:ame_lottery_jackpot:0%", "", "&8Билет стоит $100. С каждых $100 в джекпот идёт $50."]
  }

  # Кнопка покупки билета
  {
    slot: 13
    material: PAPER
    name: "&aКупить билет &8($100)"
    lore: [
      "&7Кликните, чтобы купить лотерейный билет."
      ""
      "&7Шанс выиграть весь джекпот - 1 к 50."
      ""
      "&7Если не повезло, $50 от стоимости билета"
      "&7уйдут в призовой фонд."
    ]
    click {
      rules { money: 100 }
      actions {
        takeMoney: 100
        # Шанс 1 к 50 выиграть джекпот.
        bulk: [
          {
            rules { chance: 2 }
            actions {
              # Выплачиваем победителю текущее значение джекпота.
              # %var_:...% внутри actions - это подстановка переменной, передаёт её текущее значение.
              giveMoney: "%var_:ame_lottery_jackpot:0%"
              setVar: "ame_lottery_jackpot::0"
              sound: ${successSound}
              broadcast: "&6&lДЖЕКПОТ! &f%player_name% &aвыиграл $%var_:ame_lottery_jackpot:0% в лотерее!"
              message: "&6&lВы выиграли джекпот!"
            }
            denyActions {
              # Не выиграли - $50 от стоимости билета уходят в джекпот.
              incVar { name: "ame_lottery_jackpot", amount: 50 }
              sound: ${failSound}
              message: "&7Не выиграли. $50 ушли в джекпот."
            }
          }
        ]
        refreshMenu: true
      }
      denyActions: ${denyNoMoney}
    }
  }

  # Сброс (только для админов) - на случай, если для тестов нужно очистить состояние меню
  {
    slot: 16
    material: BARRIER
    name: "&cАдмин: сбросить джекпот в 0"
    lore: ["&8Только для админов. Для тестов."]
    rules: ${rulesAdmin}
    click {
      actions {
        setVar: "ame_lottery_jackpot::0"
        sound: ${clickSound}
        message: "&aДжекпот сброшен."
        refreshMenu: true
      }
    }
  }

  ${buttonClose} { slot: 22 }
]
