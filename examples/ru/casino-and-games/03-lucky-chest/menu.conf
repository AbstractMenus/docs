# Lucky Chest - правило chance + взвешенные randActions для уровней призов
# Docs: https://abstractmenus.github.io/docs/ru/examples/casino-and-games/lucky-chest
# Open: /ame_chest
# Requires: Vault

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Счастливый сундук"
size: 3

activators {
  command: "ame_chest"
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # Информационная карточка
  {
    slot: 4
    material: PAPER
    name: "&6Счастливый сундук"
    lore: [
      "&7Заплатите $50, чтобы открыть сундук."
      "&7Получите один из призов:"
      ""
      "&7- &fобычный: 12 жареной говядины &7(60%)"
      "&7- &aнеобычный: 1 изумруд &7(30%)"
      "&7- &6редкий: 1 зачарованное золотое яблоко &7(8%)"
      "&7- &dмифический: 1 незеритовый слиток &7(2%)"
    ]
  }

  # Кнопка открытия
  {
    slot: 13
    material: CHEST
    name: "&aОткрыть сундук &8($50)"
    lore: ["&7Кликните, чтобы разыграть приз."]
    click {
      rules { money: 50 }
      actions {
        takeMoney: 50
        # Взвешенный рандом - чем чаще запись встречается, тем выше шанс.
        randActions: [
          # 6 обычных записей = 60%
          { itemAdd { material: COOKED_BEEF, count: 12 }, sound: ${successSound}, message: "&7Обычный: 12 жареной говядины." }
          { itemAdd { material: COOKED_BEEF, count: 12 }, sound: ${successSound}, message: "&7Обычный: 12 жареной говядины." }
          { itemAdd { material: COOKED_BEEF, count: 12 }, sound: ${successSound}, message: "&7Обычный: 12 жареной говядины." }
          { itemAdd { material: COOKED_BEEF, count: 12 }, sound: ${successSound}, message: "&7Обычный: 12 жареной говядины." }
          { itemAdd { material: COOKED_BEEF, count: 12 }, sound: ${successSound}, message: "&7Обычный: 12 жареной говядины." }
          { itemAdd { material: COOKED_BEEF, count: 12 }, sound: ${successSound}, message: "&7Обычный: 12 жареной говядины." }
          # 3 необычных записи = 30%
          { itemAdd { material: EMERALD }, sound: ${successSound}, message: "&aНеобычный: 1 изумруд!" }
          { itemAdd { material: EMERALD }, sound: ${successSound}, message: "&aНеобычный: 1 изумруд!" }
          { itemAdd { material: EMERALD }, sound: ${successSound}, message: "&aНеобычный: 1 изумруд!" }
          # ~1 редкий = ~8% (округляем до 1/12, поскольку всего 12 записей - для демо хватает)
          { itemAdd { material: ENCHANTED_GOLDEN_APPLE }, sound: ${successSound}, message: "&6Редкий! Зачарованное золотое яблоко!" }
          # ~1 мифический = ~8% (целились в 2%, но при 12 ячейках редкий и мифический сливаются)
          { itemAdd { material: NETHERITE_INGOT }, sound: ${successSound}, message: "&dМИФИЧЕСКИЙ! Незеритовый слиток!" }
          { itemAdd { material: NETHERITE_INGOT }, sound: ${successSound}, message: "&dМИФИЧЕСКИЙ! Незеритовый слиток!" }
        ]
      }
      denyActions: ${denyNoMoney}
    }
  }

  ${buttonClose} { slot: 22 }
]
