# Выбор тега - теги-префиксы на основе LuckPerms meta
# Docs: https://abstractmenus.github.io/docs/ru/examples/cosmetics/tags
# Open: /ame_tags
# Requires: LuckPerms

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Выбери свой тег"
size: 3

activators {
  command: "ame_tags"
}

# Переиспользуемый обработчик клика для применения тега. Каждый тег ссылается на него с переопределённой строкой тега.
applyTag {
  actions {
    lpMetaSet {
      metaList: [
        { key: "ame_tag", value: "%selected_tag%" }
      ]
    }
    sound: ${successSound}
    closeMenu: true
  }
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # Тег-сердце
  {
    slot: 11
    material: RED_DYE
    name: "&c♥ Сердце"
    lore: ["&7Розовое сердце рядом с твоим ником."]
    click {
      actions {
        lpMetaSet {
          metaList: [{ key: "ame_tag", value: "&c♥" }]
        }
        sound: ${successSound}
        message: "&cТег установлен на &c♥"
        closeMenu: true
      }
    }
  }

  # Тег-звезда
  {
    slot: 12
    material: NETHER_STAR
    name: "&e★ Звезда"
    lore: ["&7Жёлтая звезда."]
    click {
      actions {
        lpMetaSet {
          metaList: [{ key: "ame_tag", value: "&e★" }]
        }
        sound: ${successSound}
        message: "&eТег установлен на &e★"
        closeMenu: true
      }
    }
  }

  # Тег-корона - только для VIP
  {
    slot: 13
    material: GOLDEN_HELMET
    name: "&6♛ Корона &8(VIP)"
    lore: ["&7Королевская корона.", "", "&8Требуется ранг VIP"]
    rules { permission: "abstractmenus.vip" }
    click {
      actions {
        lpMetaSet {
          metaList: [{ key: "ame_tag", value: "&6♛" }]
        }
        sound: ${successSound}
        message: "&6Тег установлен на &6♛"
        closeMenu: true
      }
    }
    denyActions: ${denyNoPerm}
  }

  # Тег-череп
  {
    slot: 14
    material: SKELETON_SKULL
    name: "&8☠ Череп"
    lore: ["&7Жуткий череп."]
    click {
      actions {
        lpMetaSet {
          metaList: [{ key: "ame_tag", value: "&8☠" }]
        }
        sound: ${successSound}
        message: "&8Тег установлен на &8☠"
        closeMenu: true
      }
    }
  }

  # Сброс / очистка тега
  {
    slot: 15
    material: BARRIER
    name: "&7Очистить тег"
    lore: ["&7Удалить текущий тег."]
    click {
      actions {
        lpMetaRemove: ["ame_tag"]
        sound: ${clickSound}
        message: "&7Тег удалён."
        closeMenu: true
      }
    }
  }

  ${buttonClose} { slot: 22 }
]
