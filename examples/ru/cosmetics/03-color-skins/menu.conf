# Цветные скины - выбор скина через действие setSkin
# Docs: https://abstractmenus.github.io/docs/ru/examples/cosmetics/color-skins
# Open: /ame_skins
# Requires: SkinsRestorer

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Выбор скина"
size: 3

activators {
  command: "ame_skins"
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  {
    slot: 4
    material: PLAYER_HEAD
    name: "&6&lВыбери скин"
    lore: ["&7Выбери цвет для своего персонажа."]
  }

  # Четыре цветных варианта. Замени texture и signature на значения с
  # https://mineskin.org для реальных скинов. Заглушки ниже HOCON примет,
  # но SkinsRestorer отклонит их во время выполнения.

  {
    slot: 10
    material: PLAYER_HEAD
    texture: "REPLACE_WITH_PREVIEW_TEXTURE_HASH_GOLD"
    name: "&6Золотой"
    click {
      actions {
        closeMenu: 1
        setSkin {
          texture: "REPLACE_WITH_TEXTURE_BASE64_GOLD"
          signature: "REPLACE_WITH_SIGNATURE_GOLD"
        }
        sound: ${successSound}
        message: "&aЗолотой скин применён. Перезайди, чтобы увидеть изменения."
      }
    }
  }

  {
    slot: 12
    material: PLAYER_HEAD
    texture: "REPLACE_WITH_PREVIEW_TEXTURE_HASH_PURPLE"
    name: "&dФиолетовый"
    click {
      actions {
        closeMenu: 1
        setSkin {
          texture: "REPLACE_WITH_TEXTURE_BASE64_PURPLE"
          signature: "REPLACE_WITH_SIGNATURE_PURPLE"
        }
        sound: ${successSound}
        message: "&dФиолетовый скин применён. Перезайди, чтобы увидеть изменения."
      }
    }
  }

  {
    slot: 14
    material: PLAYER_HEAD
    texture: "REPLACE_WITH_PREVIEW_TEXTURE_HASH_BLUE"
    name: "&9Синий"
    click {
      actions {
        closeMenu: 1
        setSkin {
          texture: "REPLACE_WITH_TEXTURE_BASE64_BLUE"
          signature: "REPLACE_WITH_SIGNATURE_BLUE"
        }
        sound: ${successSound}
        message: "&9Синий скин применён. Перезайди, чтобы увидеть изменения."
      }
    }
  }

  {
    slot: 16
    material: BARRIER
    name: "&7Сбросить на стандартный"
    lore: ["&7Вернуть исходный скин."]
    click {
      actions {
        closeMenu: 1
        resetSkin: true
        sound: ${clickSound}
        message: "&7Стандартный скин восстановлен. Перезайди, чтобы увидеть изменения."
      }
    }
  }

  ${buttonClose} { slot: 22 }
]
