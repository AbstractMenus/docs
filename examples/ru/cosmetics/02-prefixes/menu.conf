# Префиксы - выбор префикса через группы LuckPerms
# Docs: https://abstractmenus.github.io/docs/ru/examples/cosmetics/prefixes
# Open: /ame_prefixes
# Requires: LuckPerms

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Выбери свой префикс"
size: 3

activators {
  command: "ame_prefixes"
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # Каждый префикс - это группа LuckPerms. Клик добавляет игрока в эту группу
  # (и удаляет из остальных, чтобы активным был только один префикс).

  {
    slot: 11
    material: GREEN_WOOL
    name: "&a[Member]"
    lore: [
      "&7Стандартный префикс."
      "&7Бесплатный для всех игроков."
    ]
    click {
      actions {
        bulk: [
          { removeGroup: "ame_prefix_donor" }
          { removeGroup: "ame_prefix_admin" }
          { addGroup: "ame_prefix_member" }
        ]
        sound: ${successSound}
        message: "&aПрефикс установлен: [Member]."
        closeMenu: true
      }
    }
  }

  {
    slot: 13
    material: GOLD_INGOT
    name: "&6[Donor]"
    lore: [
      "&7Префикс донатера."
      "&7Доступен для поддержавших проект."
      "",
      "&8Требуется право донатера"
    ]
    rules { permission: "abstractmenus.donator" }
    click {
      actions {
        bulk: [
          { removeGroup: "ame_prefix_member" }
          { removeGroup: "ame_prefix_admin" }
          { addGroup: "ame_prefix_donor" }
        ]
        sound: ${successSound}
        message: "&6Префикс установлен: [Donor]."
        closeMenu: true
      }
    }
    denyActions: ${denyNoPerm}
  }

  {
    slot: 15
    material: NETHERITE_INGOT
    name: "&c[Admin]"
    lore: [
      "&7Префикс администратора."
      "",
      "&8Требуется право администратора"
    ]
    rules { permission: "abstractmenus.admin" }
    click {
      actions {
        bulk: [
          { removeGroup: "ame_prefix_member" }
          { removeGroup: "ame_prefix_donor" }
          { addGroup: "ame_prefix_admin" }
        ]
        sound: ${successSound}
        message: "&cПрефикс установлен: [Admin]."
        closeMenu: true
      }
    }
    denyActions: ${denyNoPerm}
  }

  ${buttonClose} { slot: 22 }
]
