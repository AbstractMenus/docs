# Quick Mod - меню для админов с частыми модераторскими командами
# Docs: https://abstractmenus.github.io/docs/ru/examples/admin-tools/quick-mod
# Open: /ame_mod  (только для админов)
# Requires: любой плагин с командами /kick /ban /mute /gamemode

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&cБыстрые инструменты модератора"
size: 3

# Доступ на уровне меню - не-админы вообще не смогут его открыть.
rules: ${rulesAdmin}

activators {
  command: "ame_mod"
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  {
    slot: 4
    material: NETHER_STAR
    name: "&c&lБыстрые инструменты модератора"
    lore: ["&7Частые модераторские действия.", "&8Только для админов."]
  }

  # ========== Переключение режимов игры ==========
  {
    slot: 10
    material: GRASS_BLOCK
    name: "&aВыживание"
    lore: ["&7Переключить себя в режим выживания."]
    click {
      actions {
        setGamemode: "SURVIVAL"
        sound: ${clickSound}
        message: "&aРежим: SURVIVAL"
      }
    }
  }
  {
    slot: 11
    material: DIAMOND_PICKAXE
    name: "&aТворчество"
    flags: HIDE_ATTRIBUTES
    lore: ["&7Переключить себя в творческий режим."]
    click {
      actions {
        setGamemode: "CREATIVE"
        sound: ${clickSound}
        message: "&aРежим: CREATIVE"
      }
    }
  }
  {
    slot: 12
    material: ENDER_EYE
    name: "&aНаблюдатель"
    lore: ["&7Переключить себя в режим наблюдателя."]
    click {
      actions {
        setGamemode: "SPECTATOR"
        sound: ${clickSound}
        message: "&aРежим: SPECTATOR"
      }
    }
  }

  # ========== Браузер игроков ==========
  {
    slot: 14
    material: PLAYER_HEAD
    name: "&aСписок онлайн-игроков"
    lore: ["&7Открыть меню онлайн-игроков", "&7для кика и телепорта."]
    click { openMenu: "ame_online" }
  }

  # ========== Серверные действия ==========
  {
    slot: 15
    material: TNT
    name: "&cОбъявление: рестарт сервера"
    lore: ["&7Отправить предупреждение в чат."]
    click {
      actions {
        broadcast: "&c[Админ] &fРестарт сервера через 5 минут. Сохраните прогресс."
        sound: ${successSound}
      }
    }
  }
  {
    slot: 16
    material: COMPASS
    name: "&aТелепорт на спавн"
    lore: ["&7Выполнить /spawn для себя."]
    click {
      actions {
        command {
          player: "spawn"
        }
        sound: ${clickSound}
        closeMenu: true
      }
    }
  }

  ${buttonClose} { slot: 22 }
]
