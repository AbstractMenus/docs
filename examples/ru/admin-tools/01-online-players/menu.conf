# Онлайн-игроки - сгенерированное меню-каталог онлайн-игроков с админскими действиями
# Docs: https://abstractmenus.github.io/docs/ru/examples/admin-tools/online-players
# Open: /ame_online
# Requires: -

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Онлайн-игроки (страница %page% / %pages_count%)"
size: 6

# Ограничиваем доступ - только для админов.
rules: ${rulesAdmin}

activators {
  command: "ame_online"
}

# Подтягиваем онлайн-игроков как записи каталога. Каждая запись даёт плейсхолдеры %ctg_player_*%.
catalog {
  type: PLAYERS
}

# Сетка 7 в ширину из голов игроков с рамкой. 4 ряда по 7 = 28 голов на странице.
matrix {
  cells: [
    "_________"
    "_xxxxxxx_"
    "_xxxxxxx_"
    "_xxxxxxx_"
    "_xxxxxxx_"
    "_________"
  ]

  templates {
    "x" {
      material: PLAYER_HEAD
      skullOwner: "%ctg_player_name%"
      name: "&e%ctg_player_name%"
      lore: [
        "&7Здоровье: &c%ctg_player_health%"
        "&7Мир: &b%ctg_player_world%"
        ""
        "&aЛКМ        - телепорт к игроку"
        "&cShift+ЛКМ  - кикнуть игрока"
      ]
      click {
        left {
          actions {
            command {
              console: "tp %player_name% %ctg_player_name%"
            }
            sound: ${clickSound}
            closeMenu: true
          }
        }
        shift_left {
          actions {
            command {
              console: "kick %ctg_player_name% &cКикнут админом"
            }
            sound: ${successSound}
            refreshMenu: true
            message: "&aКикнут &e%ctg_player_name%"
          }
        }
      }
    }
  }
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "45-53" }

  # Кнопки пагинации - показываются только когда страниц больше одной.
  ${buttonPrev} { slot: 48 }
  ${buttonNext} { slot: 50 }

  # Счётчик страниц (только для информации)
  {
    slot: 49
    material: PAPER
    name: "&eСтраница %page% / %pages_count%"
    lore: ["&7Всего онлайн: &e%pages_total%"]
  }

  ${buttonClose} { slot: 53 }
]
