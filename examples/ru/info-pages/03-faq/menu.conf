# FAQ - меню-хаб с вопросами, по клику открывается ответ в подменю
# Документация: https://abstractmenus.github.io/docs/ru/examples/info-pages/faq
# Открыть: /ame_faq
# Требует: -

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

menus {

  # Главная страница FAQ - список вопросов
  ame_faq {
    title: "&6Часто задаваемые вопросы"
    size: 3

    activators {
      command: "ame_faq"
    }

    items: [
      ${borderBlack} { slot: "0-8" }
      ${borderBlack} { slot: "18-26" }

      {
        slot: 4
        material: WRITTEN_BOOK
        name: "&6&lFAQ"
        lore: ["&7Кликните по любому вопросу, чтобы увидеть ответ."]
      }

      {
        slot: 10
        material: PAPER
        name: "&aКак приватизировать территорию?"
        click { openMenu: "ame_faq_a1" }
      }
      {
        slot: 12
        material: PAPER
        name: "&aЧто даёт VIP?"
        click { openMenu: "ame_faq_a2" }
      }
      {
        slot: 14
        material: PAPER
        name: "&aКак пожаловаться на игрока?"
        click { openMenu: "ame_faq_a3" }
      }
      {
        slot: 16
        material: PAPER
        name: "&aГде найти правила сервера?"
        click { openMenu: "ame_rules" }
      }

      ${buttonClose} { slot: 22 }
    ]
  }

  # Ответ 1 - Приватизация территории
  ame_faq_a1 {
    title: "&6FAQ - Приватизация"
    size: 3
    items: [
      ${borderBlack} { slot: "0-8" }
      ${borderBlack} { slot: "18-26" }
      {
        slot: 13
        material: GRASS_BLOCK
        name: "&aКак приватизировать территорию?"
        lore: [
          "&7Используйте золотую лопату,"
          "&7чтобы отметить углы участка."
          ""
          "&7- ПКМ по первому углу"
          "&7- ПКМ по противоположному углу"
          ""
          "&7Каждый блок стоит 1 единицу приватизации."
          "&7Получайте больше за игру или покупайте"
          "&7через /buyclaimblocks."
        ]
      }
      ${buttonBack} { slot: 18, click { openMenu: "ame_faq" } }
    ]
  }

  # Ответ 2 - Привилегии VIP
  ame_faq_a2 {
    title: "&6FAQ - Привилегии VIP"
    size: 3
    items: [
      ${borderBlack} { slot: "0-8" }
      ${borderBlack} { slot: "18-26" }
      {
        slot: 13
        material: GOLDEN_HELMET
        name: "&6Что даёт VIP?"
        lore: [
          "&7VIP включает:"
          ""
          "&7- &fцветной ник в чате"
          "&7- &f5 точек дома (вместо 1 базовой)"
          "&7- &fежедневный VIP-кит"
          "&7- &f50% скидку в магазине"
          "&7- &fэффект частиц при заходе"
          ""
          "&7Получите VIP в &e/ame_donate&7."
        ]
      }
      ${buttonBack} { slot: 18, click { openMenu: "ame_faq" } }
    ]
  }

  # Ответ 3 - Жалобы на игроков
  ame_faq_a3 {
    title: "&6FAQ - Жалобы"
    size: 3
    items: [
      ${borderBlack} { slot: "0-8" }
      ${borderBlack} { slot: "18-26" }
      {
        slot: 13
        material: BARRIER
        name: "&cЖалобы на игроков"
        lore: [
          "&7Используйте &e/report <ник> <причина>&7"
          "&7или напишите в нашем Discord:"
          "&7&fhttps://discord.gg/example"
          ""
          "&7По возможности прикладывайте скриншоты."
          "&7Модерация отвечает в течение нескольких часов."
        ]
      }
      ${buttonBack} { slot: 18, click { openMenu: "ame_faq" } }
    ]
  }

}
