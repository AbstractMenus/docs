# Ссылки сервера - внешние ссылки через openBook
# Документация: https://abstractmenus.github.io/docs/ru/examples/info-pages/server-links
# Открыть: /ame_links
# Требует: -

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Полезные ссылки"
size: 3

activators {
  command: "ame_links"
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # Заголовок
  {
    slot: 4
    material: WRITTEN_BOOK
    name: "&6&lРесурсы MyTestServer"
    lore: ["&7Кликните по плитке, чтобы получить ссылку.", "&7Книги открывают кликабельные URL."]
  }

  # Discord - открывает книгу со ссылкой-приглашением.
  {
    slot: 11
    material: PURPLE_DYE
    name: "&5Discord"
    lore: ["&7Присоединяйтесь к нашему Discord-серверу.", "", "&aКлик - открыть ссылку"]
    click {
      actions {
        openBook {
          author: "MyTestServer"
          title: "&5Discord"
          pages: [
            "Кликните по ссылке ниже, чтобы открыть приглашение в Discord:\n\nhttps://discord.gg/example"
          ]
        }
        sound: ${clickSound}
        closeMenu: true
      }
    }
  }

  # Сайт
  {
    slot: 13
    material: COMPASS
    name: "&aСайт"
    lore: ["&7Посетите наш сайт.", "", "&aКлик - открыть ссылку"]
    click {
      actions {
        openBook {
          author: "MyTestServer"
          title: "&aСайт"
          pages: [
            "Кликните по ссылке ниже, чтобы перейти на наш сайт:\n\nhttps://example.org"
          ]
        }
        sound: ${clickSound}
        closeMenu: true
      }
    }
  }

  # GitHub / исходники
  {
    slot: 15
    material: WRITABLE_BOOK
    name: "&8GitHub"
    lore: ["&7Исходный код и трекер задач.", "", "&aКлик - открыть ссылку"]
    click {
      actions {
        openBook {
          author: "MyTestServer"
          title: "&8GitHub"
          pages: [
            "Кликните по ссылке ниже, чтобы открыть наш GitHub:\n\nhttps://github.com/example"
          ]
        }
        sound: ${clickSound}
        closeMenu: true
      }
    }
  }

  ${buttonClose} { slot: 22 }
]
