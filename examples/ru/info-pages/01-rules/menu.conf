# Правила сервера - информационное меню только для чтения
# Документация: https://abstractmenus.github.io/docs/ru/examples/info-pages/rules
# Открыть: /ame_rules
# Требует: -

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Правила сервера"
size: 5

activators {
  command: "ame_rules"
}

items: [
  # Декоративные рамки
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "36-44" }

  # Заголовок
  {
    slot: 4
    material: WRITTEN_BOOK
    name: "&6&lПравила MyTestServer"
    lore: [
      "&7Читайте внимательно."
      "&7Нарушение любого правила может привести к бану."
    ]
  }

  # Правило 1
  {
    slot: 19
    material: PAPER
    name: "&e1. Без гриферства"
    lore: [
      "&7Не разрушайте и не изменяйте"
      "&7постройки других игроков без"
      "&7их явного разрешения."
      ""
      "&8Первое нарушение: предупреждение"
      "&8Повторное: бан на 7 дней"
    ]
  }

  # Правило 2
  {
    slot: 21
    material: PAPER
    name: "&e2. Вежливость в чате"
    lore: [
      "&7Никаких оскорблений, травли"
      "&7и спама. Английский в основном чате,"
      "&7другие языки - в своих каналах."
      ""
      "&8Первое нарушение: мут на 1 час"
      "&8Повторное: бессрочный мут"
    ]
  }

  # Правило 3
  {
    slot: 23
    material: PAPER
    name: "&e3. Без читов"
    lore: [
      "&7Читы, x-ray, автокликеры"
      "&7и подобные моды запрещены."
      "&7Optifine и шейдеры разрешены."
      ""
      "&8Первое нарушение: бессрочный бан"
    ]
  }

  # Правило 4
  {
    slot: 25
    material: PAPER
    name: "&e4. Без продажи за реальные деньги"
    lore: [
      "&7Продажа предметов, привилегий"
      "&7или услуг за реальные деньги запрещена."
      "&7Используйте только официальное меню доната."
      ""
      "&8Первое нарушение: бессрочный бан"
    ]
  }

  # Кнопка закрытия
  ${buttonClose} { slot: 40 }
]
