# Донат-магазин с уровнями рангов - 4 ранга с двумя вариантами отображения HAS_RANK / NO_RANK
# Docs: https://abstractmenus.github.io/docs/ru/examples/donate/tiered-ranks
# Open: /ame_donate
# Requires: LuckPerms

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Донат-магазин - Ранги"
size: 5

activators {
  command: ["ame_donate", "ame_support"]
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "36-44" }

  # Заголовок
  {
    slot: 4
    material: NETHER_STAR
    name: "&6&lПоддержать MyTestServer"
    lore: ["&7Выберите ранг, чтобы узнать подробнее.", "&7Покупка рангов поддерживает сервер."]
  }

  # ========== Knight ==========
  # Вариант HAS_RANK: у игрока уже есть право knight, повторно купить нельзя.
  {
    slot: 19
    material: IRON_SWORD
    name: "&7Knight &8(&aКуплено&8)"
    lore: [
      "&7Ранг поддержки 1 уровня."
      ""
      "&aЭтот ранг уже куплен."
      "&7Подумайте об апгрейде ниже."
    ]
    flags: HIDE_ATTRIBUTES
    rules { permission: "myserver.rank.knight" }
  }
  # Вариант NO_RANK: ранга ещё нет, показываем цену.
  {
    slot: 19
    material: IRON_SWORD
    name: "&7Knight"
    lore: [
      "&7Ранг поддержки 1 уровня."
      ""
      "&7Включает:"
      "&7- &fцветной ник в чате"
      "&7- &f3 точки дома"
      ""
      "&eЦена: &a$5"
      ""
      "&aЛевый клик - подробнее"
    ]
    flags: HIDE_ATTRIBUTES
    click {
      actions {
        # В рабочем варианте здесь открывалось бы меню подтверждения / страница покупки.
        # В этом примере просто выводим сообщение.
        message: "&aОткройте страницу доната https://example.org, чтобы купить Knight."
        sound: ${clickSound}
      }
    }
  }

  # ========== Paladin ==========
  {
    slot: 21
    material: GOLDEN_SWORD
    name: "&6Paladin &8(&aКуплено&8)"
    lore: ["&7Ранг поддержки 2 уровня.", "", "&aЭтот ранг уже куплен."]
    flags: HIDE_ATTRIBUTES
    rules { permission: "myserver.rank.paladin" }
  }
  {
    slot: 21
    material: GOLDEN_SWORD
    name: "&6Paladin"
    lore: [
      "&7Ранг поддержки 2 уровня."
      ""
      "&7Включает:"
      "&7- &fвсё, что у Knight"
      "&7- &f5 точек дома"
      "&7- &f/fly в строительных мирах"
      ""
      "&eЦена: &a$15"
    ]
    flags: HIDE_ATTRIBUTES
    click {
      actions {
        message: "&aОткройте страницу доната https://example.org, чтобы купить Paladin."
        sound: ${clickSound}
      }
    }
  }

  # ========== Lord ==========
  {
    slot: 23
    material: DIAMOND_SWORD
    name: "&bLord &8(&aКуплено&8)"
    lore: ["&7Ранг поддержки 3 уровня.", "", "&aЭтот ранг уже куплен."]
    flags: HIDE_ATTRIBUTES
    rules { permission: "myserver.rank.lord" }
  }
  {
    slot: 23
    material: DIAMOND_SWORD
    name: "&bLord"
    lore: [
      "&7Ранг поддержки 3 уровня."
      ""
      "&7Включает:"
      "&7- &fвсё, что у Paladin"
      "&7- &fкастомные сообщения о входе"
      "&7- &f10 точек дома"
      ""
      "&eЦена: &a$30"
    ]
    flags: HIDE_ATTRIBUTES
    click {
      actions {
        message: "&aОткройте страницу доната https://example.org, чтобы купить Lord."
        sound: ${clickSound}
      }
    }
  }

  # ========== Monarch ==========
  {
    slot: 25
    material: NETHERITE_SWORD
    name: "&dMonarch &8(&aКуплено&8)"
    lore: ["&7Ранг поддержки 4 уровня.", "", "&aЭтот ранг уже куплен."]
    flags: HIDE_ATTRIBUTES
    rules { permission: "myserver.rank.monarch" }
  }
  {
    slot: 25
    material: NETHERITE_SWORD
    name: "&dMonarch"
    lore: [
      "&7Ранг поддержки 4 уровня, самый высокий."
      ""
      "&7Включает:"
      "&7- &fвсё, что у Lord"
      "&7- &fэффект частиц при входе"
      "&7- &fприоритет в очереди при заполнении"
      ""
      "&eЦена: &a$60"
    ]
    flags: HIDE_ATTRIBUTES
    click {
      actions {
        message: "&aОткройте страницу доната https://example.org, чтобы купить Monarch."
        sound: ${clickSound}
      }
    }
  }

  ${buttonClose} { slot: 40 }
]
