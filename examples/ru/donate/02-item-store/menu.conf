# Донат-магазин предметов - покупка внутриигровых предметов за донатные токены
# Docs: https://abstractmenus.github.io/docs/ru/examples/donate/item-store
# Open: /ame_store
# Requires: Vault (или PlayerPoints addon для донатных токенов)

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Донат-магазин предметов"
size: 3

activators {
  command: "ame_store"
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # Заголовок
  {
    slot: 4
    material: NETHER_STAR
    name: "&6&lДонат-предметы"
    lore: ["&7Особые предметы, которые можно купить", "&7за донатную валюту."]
  }

  # Мифический меч
  {
    slot: 11
    material: NETHERITE_SWORD
    name: "&dМифический меч"
    lore: [
      "&7Уникальный зачарованный меч."
      ""
      "&7Острота V"
      "&7Прочность III"
      "&7Починка"
      ""
      "&eЦена: &a1000 токенов"
    ]
    flags: HIDE_ATTRIBUTES
    click {
      rules { money: 1000 }
      actions {
        takeMoney: 1000
        itemAdd {
          material: NETHERITE_SWORD
          name: "&dМифический меч"
          enchantments {
            sharpness: 5
            unbreaking: 3
            mending: 1
          }
        }
        sound: ${successSound}
        message: "&dВы получили Мифический меч!"
      }
      denyActions: ${denyNoMoney}
    }
  }

  # Постоянный токен полёта
  {
    slot: 13
    material: ELYTRA
    name: "&bЭлитры"
    lore: [
      "&7Ванильные элитры для полёта в выживании."
      ""
      "&eЦена: &a500 токенов"
    ]
    flags: HIDE_ATTRIBUTES
    click {
      rules { money: 500 }
      actions {
        takeMoney: 500
        itemAdd { material: ELYTRA }
        sound: ${successSound}
        message: "&aЭлитры добавлены в инвентарь."
      }
      denyActions: ${denyNoMoney}
    }
  }

  # Набор голов
  {
    slot: 15
    material: PLAYER_HEAD
    name: "&6Набор декоративных голов (5x)"
    lore: [
      "&7Пять голов игрока с кастомными"
      "&7текстурами для декора."
      ""
      "&eЦена: &a100 токенов"
    ]
    click {
      rules { money: 100 }
      actions {
        takeMoney: 100
        itemAdd: [
          { material: PLAYER_HEAD, count: 5 }
        ]
        sound: ${successSound}
        message: "&aНабор голов выдан."
      }
      denyActions: ${denyNoMoney}
    }
  }

  ${buttonClose} { slot: 22 }
]
