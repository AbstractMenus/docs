# Сниппет: randActions для одного из N случайных исходов
# Документация: https://abstractmenus.github.io/docs/ru/examples/snippets/action-rand-actions
# Открыть: /ame_snip_rand

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Случайные действия"
size: 1
activators { command: "ame_snip_rand" }

items: [
  {
    slot: 4
    material: ENDER_PEARL
    name: "&5Бросок удачи"
    lore: ["&7Клик - случайный исход из 4 вариантов."]
    click {
      actions {
        # Случайно выбрать ровно одну из 4 записей и выполнить её блок.
        randActions: [
          {
            sound: ${successSound}
            message: "&aДжекпот! +10 опыта"
            giveXp: 10
          }
          {
            sound: ${successSound}
            message: "&eНеплохо. +1 изумруд"
            itemAdd { material: EMERALD }
          }
          {
            sound: ${clickSound}
            message: "&7Так себе. +5 жареной говядины"
            itemAdd { material: COOKED_BEEF, count: 5 }
          }
          {
            sound: ${failSound}
            message: "&cПовезёт в следующий раз."
          }
        ]
      }
    }
  }
  ${buttonClose} { slot: 8 }
]
