# Инвентарный крафт - крафт предметов с расходом ингредиентов из инвентаря
# Документация: https://abstractmenus.github.io/docs/ru/examples/snippets/inventory-crafting
# Открыть: /ame_craft
# Требования: -

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Верстак охотника"
size: 1

activators {
  command: "ame_craft"
}

# Определения рецептов на уровне файла - блок click ссылается на них через ${...}.

helmetRecipe {
  output {
    material: LEATHER_HELMET
    name: "&aШляпа охотника"
    enchantments {
      durability: 2
    }
  }
  requirements: [
    { material: LEATHER, count: 5 }
  ]
}

chestplateRecipe {
  output {
    material: LEATHER_CHESTPLATE
    name: "&aКуртка охотника"
    enchantments {
      durability: 2
      thorns: 1
    }
  }
  requirements: [
    { material: LEATHER, count: 8 }
    { material: STRING,  count: 1 }
    { material: IRON_INGOT, count: 1 }
  ]
}

items: [
  ${helmetRecipe.output} {
    slot: 2
    flags: HIDE_ATTRIBUTES
    lore: [
      "&7Требуется:"
      "&7- Кожа x5"
      ""
      "&aКлик для крафта"
    ]
    click {
      rules {
        inventoryItems: ${helmetRecipe.requirements}
      }
      actions {
        itemRemove: ${helmetRecipe.requirements}
        itemAdd: ${helmetRecipe.output}
        sound: ${successSound}
        message: "&aВы скрафтили Шляпу охотника!"
      }
      denyActions: ${denyNotEnoughItems}
    }
  }

  ${chestplateRecipe.output} {
    slot: 6
    flags: HIDE_ATTRIBUTES
    lore: [
      "&7Требуется:"
      "&7- Кожа x8"
      "&7- Нить x1"
      "&7- Железный слиток x1"
      ""
      "&aКлик для крафта"
    ]
    click {
      rules {
        inventoryItems: ${chestplateRecipe.requirements}
      }
      actions {
        itemRemove: ${chestplateRecipe.requirements}
        itemAdd: ${chestplateRecipe.output}
        sound: ${successSound}
        message: "&aВы скрафтили Куртку охотника!"
      }
      denyActions: ${denyNotEnoughItems}
    }
  }

  ${buttonClose} { slot: 8 }
]

# Локальное действие для случая нехватки ингредиентов
denyNotEnoughItems {
  sound:   ${deniedSound}
  message: "&cУ вас недостаточно материалов."
}
