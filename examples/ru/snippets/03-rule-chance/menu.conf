# Сниппет: правило chance для вероятностного отображения
# Документация: https://abstractmenus.github.io/docs/ru/examples/snippets/rule-chance
# Открыть: /ame_snip_chance

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Правило chance"
size: 1
activators { command: "ame_snip_chance" }

items: [
  # 30% шанс отрисовать этот редкий предмет в слоте 4
  {
    slot: 4
    material: NETHER_STAR
    name: "&dРедкая звезда"
    lore: ["&7Появляется с шансом 30%."]
    rules { chance: 30 }
  }
  # Запасной вариант: с шансом 70% слот остаётся пустым (без запасного предмета, просто пустой слот)
  ${buttonClose} { slot: 8 }
]
