# Сниппет: правило if с выражением на плейсхолдерах
# Документация: https://abstractmenus.github.io/docs/ru/examples/snippets/rule-if-placeholder
# Открыть: /ame_snip_if

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Правило if"
size: 1
activators { command: "ame_snip_if" }

items: [
  # Виден только игрокам с уровнем 10+. Сравнивает плейсхолдер через выражение.
  {
    slot: 4
    material: ENCHANTED_BOOK
    name: "&aНаграда за уровень 10+"
    lore: ["&7Виден всем, у кого 10-й уровень или выше."]
    rules {
      if: "%player_level% >= 10"
    }
    click {
      actions {
        itemAdd { material: EXPERIENCE_BOTTLE, count: 4 }
        sound: ${successSound}
      }
    }
  }

  # Запасное сообщение для игроков с низким уровнем
  {
    slot: 4
    material: BARRIER
    name: "&cНедостаточно уровня"
    lore: ["&7Получите 10-й уровень, чтобы забрать награду."]
  }

  ${buttonClose} { slot: 8 }
]
