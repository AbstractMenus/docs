# Сниппет: активатор clickItem - открыть меню правым кликом по предмету в руке
# Документация: https://abstractmenus.github.io/docs/ru/examples/snippets/activator-clickitem
# Открыть: возьмите NETHER_STAR с именем "Жезл меню" и кликните по нему правой кнопкой.
# (Для теста получите его командой: /give @s minecraft:nether_star{display:{Name:'{"text":"Жезл меню"}'}})
# Требования: -

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Меню открыто кликом по предмету"
size: 1

activators {
  clickItem {
    material: NETHER_STAR
    name: "&6Жезл меню"
  }
}

items: [
  {
    slot: 4
    material: BOOK
    name: "&aСработало"
    lore: [
      "&7Вы открыли это меню правым кликом"
      "&7по NETHER_STAR с именем &6Жезл меню&7 в руке."
      ""
      "&7Смотрите документацию активаторов: clickEntity, clickBlockType,"
      "&7clickNPC, regionJoin и другие."
    ]
  }
  ${buttonClose} { slot: 8 }
]
