# Сниппет: обёртки действий bulk + delay
# Документация: https://abstractmenus.github.io/docs/ru/examples/snippets/action-bulk-delay
# Открыть: /ame_snip_bulkdelay

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Bulk + Delay"
size: 1
activators { command: "ame_snip_bulkdelay" }

items: [
  {
    slot: 4
    material: TNT
    name: "&cОбратный отсчёт в несколько шагов"
    lore: [
      "&7Кликните - получите серию сообщений"
      "&7и звук в конце."
    ]
    click {
      actions {
        # bulk = список групп действий, выполняются по порядку
        bulk: [
          { message: "&e3..." }
          { message: "&62..." }
          { message: "&c1..." }
        ]
        # delay = выполнить вложенный блок actions через N тиков
        delay {
          delay: 60
          actions {
            sound: ${successSound}
            message: "&aБум!"
          }
        }
      }
    }
  }
  ${buttonClose} { slot: 8 }
]
