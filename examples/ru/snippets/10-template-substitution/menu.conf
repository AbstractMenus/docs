# Сниппет: подстановка шаблона HOCON + переопределение
# Документация: https://abstractmenus.github.io/docs/ru/examples/snippets/template-substitution
# Открыть: /ame_snip_template

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Подстановка шаблона"
size: 1
activators { command: "ame_snip_template" }

# Переиспользуемый шаблон предмета, определённый на уровне файла.
prizeTile {
  material: NETHER_STAR
  lore: ["&7Кликните за призом."]
  click {
    actions {
      itemAdd { material: DIAMOND }
      sound: ${successSound}
    }
  }
}

items: [
  # Ссылаемся на шаблон, переопределяем slot + name. Блок click из prizeTile сохраняется.
  ${prizeTile} {
    slot: 2
    name: "&aОбычный приз"
  }
  ${prizeTile} {
    slot: 4
    name: "&6Редкий приз"
  }
  ${prizeTile} {
    slot: 6
    name: "&dЭпический приз"
  }
  ${buttonClose} { slot: 8 }
]
