# Сниппет: действие itemAdd
# Документация: https://abstractmenus.github.io/docs/ru/examples/snippets/action-give-item
# Открыть: /ame_snip_give

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Действие itemAdd"
size: 1
activators { command: "ame_snip_give" }

items: [
  {
    slot: 4
    material: WOODEN_PICKAXE
    name: "&aДайте мне инструмент"
    lore: ["&7Кликните, чтобы получить деревянную кирку."]
    click {
      actions {
        itemAdd {
          material: WOODEN_PICKAXE
          name: "&aСтартовая кирка"
        }
        sound: ${successSound}
      }
    }
  }
  ${buttonClose} { slot: 8 }
]
