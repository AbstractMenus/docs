# Сниппет: логические обёртки and / or
# Документация: https://abstractmenus.github.io/docs/ru/examples/snippets/rule-and-or
# Открыть: /ame_snip_andor

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Логические правила"
size: 1
activators { command: "ame_snip_andor" }

items: [
  # AND - должны выполниться все вложенные правила. (Блок rules по умолчанию работает как AND, здесь явно для демонстрации.)
  {
    slot: 2
    material: DIAMOND_SWORD
    name: "&bАдмин в CREATIVE"
    lore: ["&7Нужно: право администратора И креативный режим."]
    flags: HIDE_ATTRIBUTES
    rules {
      and {
        permission: "abstractmenus.admin"
        gamemode: CREATIVE
      }
    }
  }

  # OR - выполняется как минимум одно вложенное правило.
  {
    slot: 6
    material: GOLDEN_APPLE
    name: "&aVIP или богач"
    lore: ["&7Нужно: право VIP ИЛИ $1000."]
    rules {
      or {
        permission: "abstractmenus.vip"
        money: 1000
      }
    }
  }

  ${buttonClose} { slot: 8 }
]
