# Daily Kit with Cooldown - временные переменные + паттерн с двумя предметами
# Docs: https://abstractmenus.github.io/docs/ru/examples/kits-and-rewards/daily-kit-cooldown
# Open: /ame_daily_kit
# Requires: LuckPerms (для правила group на VIP-ките)

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Ежедневные киты"
size: 3
updateInterval: 20

activators {
  command: "ame_daily_kit"
}

# Шаблоны - общие для вариантов "доступен" и "на кулдауне"

defaultKitTemplate {
  slot: 11
  material: WOODEN_SWORD
  name: "&aОбычный кит"
  flags: HIDE_ATTRIBUTES
  lore: [
    "&7В составе:"
    "&7- Кожаный комплект брони"
    "&7- Деревянный меч"
    "&7- 32 жареной говядины"
    "&7- 16 железных слитков"
  ]
}

vipKitTemplate {
  slot: 15
  material: STONE_SWORD
  name: "&6VIP-кит"
  flags: HIDE_ATTRIBUTES
  lore: [
    "&7В составе:"
    "&7- Кожаный комплект брони"
    "&7- Каменный меч"
    "&7- 32 жареной говядины"
    "&7- 32 железных слитка"
    "&7- 4 золотых яблока"
    ""
    "&8Требуется: группа VIP"
  ]
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # ========== Обычный кит ==========
  # Состояние ДОСТУПЕН: показывается, когда переменная кулдауна не существует. По клику - забрать кит.
  ${defaultKitTemplate} {
    lore: ${defaultKitTemplate.lore} [
      ""
      "&aНажми, чтобы забрать"
    ]
    click {
      actions {
        itemAdd: [
          { material: LEATHER_HELMET }
          { material: LEATHER_CHESTPLATE }
          { material: LEATHER_LEGGINGS }
          { material: LEATHER_BOOTS }
          { material: WOODEN_SWORD }
          { material: COOKED_BEEF, count: 32 }
          { material: IRON_INGOT, count: 16 }
        ]
        # Ставим временную переменную, которая истекает через 1 день - суффикс ::1d.
        setVarp: "ame_kit_default::1::1d"
        sound: ${successSound}
        message: "&aОбычный кит забран. Возвращайся через 24 часа."
        refreshMenu: true
      }
    }
  }
  # Состояние КУЛДАУН: показывается только пока существует временная переменная. Отображает оставшееся время.
  ${defaultKitTemplate} {
    material: GRAY_DYE
    lore: ${defaultKitTemplate.lore} [
      ""
      "&cДоступен через &e%varpt_:ame_kit_default%"
    ]
    rules {
      existVarp: "ame_kit_default"
    }
  }

  # ========== VIP-кит ==========
  ${vipKitTemplate} {
    lore: ${vipKitTemplate.lore} [
      ""
      "&aНажми, чтобы забрать"
    ]
    click {
      rules {
        group: "vip"
      }
      actions {
        itemAdd: [
          { material: LEATHER_HELMET }
          { material: LEATHER_CHESTPLATE }
          { material: LEATHER_LEGGINGS }
          { material: LEATHER_BOOTS }
          { material: STONE_SWORD }
          { material: COOKED_BEEF, count: 32 }
          { material: IRON_INGOT, count: 32 }
          { material: GOLDEN_APPLE, count: 4 }
        ]
        setVarp: "ame_kit_vip::1::1d"
        sound: ${successSound}
        message: "&6VIP-кит забран. Возвращайся через 24 часа."
        refreshMenu: true
      }
      denyActions: ${denyNoPerm}
    }
  }
  ${vipKitTemplate} {
    material: GRAY_DYE
    lore: ${vipKitTemplate.lore} [
      ""
      "&cДоступен через &e%varpt_:ame_kit_vip%"
    ]
    rules {
      existVarp: "ame_kit_vip"
    }
  }

  ${buttonClose} { slot: 22 }
]
