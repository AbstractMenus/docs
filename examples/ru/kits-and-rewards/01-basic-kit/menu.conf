# Basic Kit - набор предметов в один клик
# Docs: https://abstractmenus.github.io/docs/ru/examples/kits-and-rewards/basic-kit
# Open: /ame_kit
# Requires: -

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Стартовый кит"
size: 3

activators {
  command: "ame_kit"
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # Описание кита
  {
    slot: 4
    material: PAPER
    name: "&6&lСтартовый кит"
    lore: [
      "&7Получи разовый набор стартовых предметов"
      "&7и 50 опыта, чтобы начать своё приключение."
      ""
      "&eСодержимое:"
      "&7- Железный меч"
      "&7- Железная кирка"
      "&7- Хлеб x16"
      "&7- 50 опыта"
    ]
  }

  # Кнопка получения
  {
    slot: 13
    material: CHEST
    name: "&aЗабрать кит"
    lore: [
      "&7Нажми, чтобы получить кит."
    ]
    click {
      actions {
        itemAdd: [
          { material: IRON_SWORD }
          { material: IRON_PICKAXE }
          { material: BREAD, count: 16 }
        ]
        giveXp: 50
        sound: ${successSound}
        message: "&aТы забрал стартовый кит!"
        closeMenu: 20
      }
    }
  }

  ${buttonClose} { slot: 22 }
]
