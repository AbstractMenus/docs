# Tiered Kits - 3 тира китов с правами доступа, без кулдауна
# Docs: https://abstractmenus.github.io/docs/ru/examples/kits-and-rewards/tiered-kits
# Open: /ame_kit_tiers
# Requires: LuckPerms

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Киты по уровням"
size: 3

activators {
  command: "ame_kit_tiers"
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # ========== Обычный кит (всем) ==========
  {
    slot: 11
    material: WOODEN_SWORD
    name: "&7Обычный кит"
    flags: HIDE_ATTRIBUTES
    lore: [
      "&7В составе:"
      "&7- Деревянный меч"
      "&7- 8 хлеба"
      ""
      "&aБесплатно для всех"
      "&aНажми, чтобы забрать"
    ]
    click {
      actions {
        itemAdd: [
          { material: WOODEN_SWORD }
          { material: BREAD, count: 8 }
        ]
        sound: ${successSound}
        message: "&aОбычный кит забран."
      }
    }
  }

  # ========== VIP-кит (по правам) ==========
  {
    slot: 13
    material: STONE_SWORD
    name: "&6VIP-кит"
    flags: HIDE_ATTRIBUTES
    lore: [
      "&7В составе:"
      "&7- Каменный меч"
      "&7- Железная броня (полный комплект)"
      "&7- 16 хлеба, 4 золотых яблока"
      ""
      "&8Требуется: ранг VIP"
      "&aНажми, чтобы забрать"
    ]
    click {
      rules { permission: "abstractmenus.vip" }
      actions {
        itemAdd: [
          { material: STONE_SWORD }
          { material: IRON_HELMET }
          { material: IRON_CHESTPLATE }
          { material: IRON_LEGGINGS }
          { material: IRON_BOOTS }
          { material: BREAD, count: 16 }
          { material: GOLDEN_APPLE, count: 4 }
        ]
        sound: ${successSound}
        message: "&6VIP-кит забран."
      }
      denyActions: ${denyNoPerm}
    }
  }

  # ========== Elite-кит (выше уровень прав) ==========
  {
    slot: 15
    material: DIAMOND_SWORD
    name: "&dElite-кит"
    flags: HIDE_ATTRIBUTES
    lore: [
      "&7В составе:"
      "&7- Алмазный меч"
      "&7- Алмазная броня (полный комплект)"
      "&7- 32 хлеба, 8 зачарованных золотых яблок"
      ""
      "&8Требуется: ранг Elite"
      "&aНажми, чтобы забрать"
    ]
    click {
      rules { permission: "abstractmenus.elite" }
      actions {
        itemAdd: [
          { material: DIAMOND_SWORD }
          { material: DIAMOND_HELMET }
          { material: DIAMOND_CHESTPLATE }
          { material: DIAMOND_LEGGINGS }
          { material: DIAMOND_BOOTS }
          { material: BREAD, count: 32 }
          { material: ENCHANTED_GOLDEN_APPLE, count: 8 }
        ]
        sound: ${successSound}
        message: "&dElite-кит забран."
      }
      denyActions: ${denyNoPerm}
    }
  }

  ${buttonClose} { slot: 22 }
]
