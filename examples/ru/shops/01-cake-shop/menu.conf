# Cake Shop - простой пример магазина
# Docs: https://abstractmenus.github.io/docs/ru/examples/shops/cake-shop
# Open: /ame_cake_shop
# Requires: Vault

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Магазин тортов"
size: 3

activators {
  command: "ame_cake_shop"
}

items: [
  # Верхняя и нижняя рамки, через общий шаблон + диапазон слотов
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # Декоративный заголовок по центру верхнего ряда
  ${commonHeader} { slot: 4 }

  # Купить один торт за $100
  {
    slot: 11
    material: CAKE
    name: "&6Сладкий торт"
    lore: [
      "&7Вкусный торт."
      ""
      "&eЦена: &a$100"
      ""
      "&8Кликните, чтобы купить"
    ]
    click {
      rules { money: 100 }
      actions {
        takeMoney: 100
        itemAdd { material: CAKE }
        sound: ${successSound}
        message: "&aВы купили торт!"
      }
      denyActions: ${denyNoMoney}
    }
  }

  # Купить 4 печеньки за $25
  {
    slot: 13
    material: COOKIE
    count: 4
    name: "&6Печенье x4"
    lore: [
      "&7Пачка из четырёх печенек."
      ""
      "&eЦена: &a$25"
      ""
      "&8Кликните, чтобы купить"
    ]
    click {
      rules { money: 25 }
      actions {
        takeMoney: 25
        itemAdd {
          material: COOKIE
          count: 4
        }
        sound: ${successSound}
        message: "&aВы купили 4 печенья!"
      }
      denyActions: ${denyNoMoney}
    }
  }

  # Купить тыквенный пирог за $60
  {
    slot: 15
    material: PUMPKIN_PIE
    name: "&6Тыквенный пирог"
    lore: [
      "&7Сезонный фаворит."
      ""
      "&eЦена: &a$60"
      ""
      "&8Кликните, чтобы купить"
    ]
    click {
      rules { money: 60 }
      actions {
        takeMoney: 60
        itemAdd { material: PUMPKIN_PIE }
        sound: ${successSound}
        message: "&aВы купили тыквенный пирог!"
      }
      denyActions: ${denyNoMoney}
    }
  }

  # Кнопка закрытия
  ${buttonClose} { slot: 22 }
]
