# Multi-Category Shop - паттерн навигации хаб + подмагазины
# Docs: https://abstractmenus.github.io/docs/ru/examples/shops/paginated-shop
# Open: /ame_shop
# Requires: Vault

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

menus {

  # Главный хаб: открывается по /ame_shop. Плитки ведут в подмагазины.
  ame_shop {
    title: "&6Магазин предметов"
    size: 1

    activators {
      command: "ame_shop"
    }

    items: [
      {
        slot: 2
        material: BREAD
        name: "&aЕда"
        lore: ["&7Хлеб, яблоки, золотая морковь."]
        click {
          openMenu: "ame_shop_food"
        }
      }
      {
        slot: 6
        material: IRON_PICKAXE
        name: "&aИнструменты"
        lore: ["&7Кирки, топоры, лопаты."]
        flags: HIDE_ATTRIBUTES
        click {
          openMenu: "ame_shop_tools"
        }
      }
      ${buttonClose} { slot: 8 }
    ]
  }

  # Подмагазин еды: 4 предмета, демонстрация паттерна покупки.
  # Паттерн повторяется для любой другой категории - просто копируйте это меню и меняйте предметы.
  ame_shop_food {
    title: "&6Магазин > Еда"
    size: 3

    items: [
      ${borderBlack} { slot: "0-8" }
      ${borderBlack} { slot: "18-25" }

      {
        slot: 10
        material: APPLE
        count: 16
        name: "&aЯблоко x16"
        lore: ["", "&eЦена: &a$50", "", "&8Кликните, чтобы купить"]
        click {
          rules { money: 50 }
          actions {
            takeMoney: 50
            itemAdd { material: APPLE, count: 16 }
            sound: ${successSound}
          }
          denyActions: ${denyNoMoney}
        }
      }
      {
        slot: 12
        material: BREAD
        count: 8
        name: "&aХлеб x8"
        lore: ["", "&eЦена: &a$60", "", "&8Кликните, чтобы купить"]
        click {
          rules { money: 60 }
          actions {
            takeMoney: 60
            itemAdd { material: BREAD, count: 8 }
            sound: ${successSound}
          }
          denyActions: ${denyNoMoney}
        }
      }
      {
        slot: 14
        material: COOKED_BEEF
        count: 8
        name: "&aСтейк x8"
        lore: ["", "&eЦена: &a$120", "", "&8Кликните, чтобы купить"]
        click {
          rules { money: 120 }
          actions {
            takeMoney: 120
            itemAdd { material: COOKED_BEEF, count: 8 }
            sound: ${successSound}
          }
          denyActions: ${denyNoMoney}
        }
      }
      {
        slot: 16
        material: GOLDEN_CARROT
        count: 4
        name: "&6Золотая морковь x4"
        lore: ["", "&eЦена: &a$300", "", "&8Кликните, чтобы купить"]
        click {
          rules { money: 300 }
          actions {
            takeMoney: 300
            itemAdd { material: GOLDEN_CARROT, count: 4 }
            sound: ${successSound}
          }
          denyActions: ${denyNoMoney}
        }
      }

      # Назад в главный хаб
      {
        slot: 26
        material: ARROW
        name: "&eНазад"
        lore: ["&7Вернуться в главное меню магазина"]
        click {
          openMenu: "ame_shop"
        }
      }
    ]
  }

  # Подмагазин инструментов: 3 предмета, демонстрация флагов и более высоких цен.
  ame_shop_tools {
    title: "&6Магазин > Инструменты"
    size: 3

    items: [
      ${borderBlack} { slot: "0-8" }
      ${borderBlack} { slot: "18-25" }

      {
        slot: 11
        material: STONE_PICKAXE
        name: "&aКаменная кирка"
        lore: ["", "&eЦена: &a$200", "", "&8Кликните, чтобы купить"]
        flags: HIDE_ATTRIBUTES
        click {
          rules { money: 200 }
          actions {
            takeMoney: 200
            itemAdd { material: STONE_PICKAXE }
            sound: ${successSound}
          }
          denyActions: ${denyNoMoney}
        }
      }
      {
        slot: 13
        material: IRON_PICKAXE
        name: "&aЖелезная кирка"
        lore: ["", "&eЦена: &a$800", "", "&8Кликните, чтобы купить"]
        flags: HIDE_ATTRIBUTES
        click {
          rules { money: 800 }
          actions {
            takeMoney: 800
            itemAdd { material: IRON_PICKAXE }
            sound: ${successSound}
          }
          denyActions: ${denyNoMoney}
        }
      }
      {
        slot: 15
        material: DIAMOND_PICKAXE
        name: "&bАлмазная кирка"
        lore: ["", "&eЦена: &a$3000", "", "&8Кликните, чтобы купить"]
        flags: HIDE_ATTRIBUTES
        click {
          rules { money: 3000 }
          actions {
            takeMoney: 3000
            itemAdd { material: DIAMOND_PICKAXE }
            sound: ${successSound}
          }
          denyActions: ${denyNoMoney}
        }
      }

      {
        slot: 26
        material: ARROW
        name: "&eНазад"
        lore: ["&7Вернуться в главное меню магазина"]
        click {
          openMenu: "ame_shop"
        }
      }
    ]
  }

}
