# NPC Vendor - магазин, открывающийся по клику на NPC из Citizens
# Docs: https://abstractmenus.github.io/docs/ru/examples/shops/npc-vendor
# Open: правый клик по NPC из Citizens с id 1 (замените на id вашего NPC)
# Requires: Citizens, Vault

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Торговец %activator_npc_name%"
size: 3

activators {
  clickNPC: [1]
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  {
    slot: 4
    material: EMERALD
    name: "&aДобро пожаловать, путник"
    lore: ["&7Купите товары у %activator_npc_name%."]
  }

  {
    slot: 11
    material: BREAD
    count: 8
    name: "&6Хлеб x8"
    lore: ["&eЦена: &a$30"]
    click {
      rules { money: 30 }
      actions {
        takeMoney: 30
        itemAdd { material: BREAD, count: 8 }
        sound: ${successSound}
      }
      denyActions: ${denyNoMoney}
    }
  }
  {
    slot: 13
    material: COOKED_BEEF
    count: 4
    name: "&6Стейк x4"
    lore: ["&eЦена: &a$50"]
    click {
      rules { money: 50 }
      actions {
        takeMoney: 50
        itemAdd { material: COOKED_BEEF, count: 4 }
        sound: ${successSound}
      }
      denyActions: ${denyNoMoney}
    }
  }
  {
    slot: 15
    material: GOLDEN_APPLE
    name: "&6Золотое яблоко"
    lore: ["&eЦена: &a$200"]
    click {
      rules { money: 200 }
      actions {
        takeMoney: 200
        itemAdd { material: GOLDEN_APPLE }
        sound: ${successSound}
      }
      denyActions: ${denyNoMoney}
    }
  }

  ${buttonClose} { slot: 22 }
]
