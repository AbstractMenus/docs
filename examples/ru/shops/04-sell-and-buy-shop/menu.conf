# Sell-and-Buy Shop - левый клик покупает, правый продаёт
# Docs: https://abstractmenus.github.io/docs/ru/examples/shops/sell-and-buy-shop
# Open: /ame_buysell
# Requires: Vault

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Торговец"
size: 3

activators {
  command: "ame_buysell"
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # Пшеница - левый клик покупает 16 шт за $20, правый продаёт 16 шт за $15.
  {
    slot: 11
    material: WHEAT
    count: 16
    name: "&6Пшеница &8(стак из 16)"
    lore: [
      "&7Покупка: &a$20"
      "&7Продажа: &a$15"
      ""
      "&aЛевый клик  - купить"
      "&cПравый клик - продать"
    ]
    click {
      left {
        rules { money: 20 }
        actions {
          takeMoney: 20
          itemAdd { material: WHEAT, count: 16 }
          sound: ${successSound}
          message: "&aКуплено 16 пшеницы за $20."
        }
        denyActions: ${denyNoMoney}
      }
      right {
        rules { inventoryItems: [{ material: WHEAT, count: 16 }] }
        actions {
          itemRemove: [{ material: WHEAT, count: 16 }]
          giveMoney: 15
          sound: ${successSound}
          message: "&aПродано 16 пшеницы за $15."
        }
        denyActions {
          sound:   ${deniedSound}
          message: "&cУ вас нет 16 пшеницы для продажи."
        }
      }
    }
  }

  # Железо - левый/правый с более высокой ценовой категорией
  {
    slot: 13
    material: IRON_INGOT
    count: 8
    name: "&fЖелезный слиток &8(стак из 8)"
    lore: [
      "&7Покупка: &a$80"
      "&7Продажа: &a$60"
      ""
      "&aЛевый клик  - купить"
      "&cПравый клик - продать"
    ]
    click {
      left {
        rules { money: 80 }
        actions {
          takeMoney: 80
          itemAdd { material: IRON_INGOT, count: 8 }
          sound: ${successSound}
          message: "&aКуплено 8 железных слитков за $80."
        }
        denyActions: ${denyNoMoney}
      }
      right {
        rules { inventoryItems: [{ material: IRON_INGOT, count: 8 }] }
        actions {
          itemRemove: [{ material: IRON_INGOT, count: 8 }]
          giveMoney: 60
          sound: ${successSound}
          message: "&aПродано 8 железных слитков за $60."
        }
        denyActions {
          sound:   ${deniedSound}
          message: "&cУ вас нет 8 железных слитков для продажи."
        }
      }
    }
  }

  # Алмаз - больший разрыв цены для ценностей
  {
    slot: 15
    material: DIAMOND
    name: "&bАлмаз"
    lore: [
      "&7Покупка: &a$500"
      "&7Продажа: &a$350"
      ""
      "&aЛевый клик  - купить"
      "&cПравый клик - продать"
    ]
    click {
      left {
        rules { money: 500 }
        actions {
          takeMoney: 500
          itemAdd { material: DIAMOND }
          sound: ${successSound}
          message: "&aКуплен 1 алмаз за $500."
        }
        denyActions: ${denyNoMoney}
      }
      right {
        rules { inventoryItems: [{ material: DIAMOND, count: 1 }] }
        actions {
          itemRemove: [{ material: DIAMOND, count: 1 }]
          giveMoney: 350
          sound: ${successSound}
          message: "&aПродан 1 алмаз за $350."
        }
        denyActions {
          sound:   ${deniedSound}
          message: "&cУ вас нет алмаза для продажи."
        }
      }
    }
  }

  ${buttonClose} { slot: 22 }
]
