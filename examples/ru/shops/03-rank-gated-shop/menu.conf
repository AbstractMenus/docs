# Rank-Gated Shop - паттерн отображения двух вариантов HAS/NO_PERM
# Docs: https://abstractmenus.github.io/docs/ru/examples/shops/rank-gated-shop
# Open: /ame_rank_shop
# Requires: Vault, LuckPerms (или любой провайдер прав)

include required(file("./plugins/AbstractMenus/menus/example/_shared/templates.conf"))

title: "&6Магазин с проверкой ранга"
size: 3

activators {
  command: "ame_rank_shop"
}

# Переиспользуемый обработчик клика для VIP-скидки - списывает сниженную цену.
discountClick {
  rules { money: 50 }
  actions {
    takeMoney: 50
    itemAdd { material: GOLDEN_APPLE }
    sound: ${successSound}
    message: "&aКуплено со скидкой VIP."
  }
  denyActions: ${denyNoMoney}
}

# Переиспользуемый обработчик клика для обычной цены.
regularClick {
  rules { money: 100 }
  actions {
    takeMoney: 100
    itemAdd { material: GOLDEN_APPLE }
    sound: ${successSound}
    message: "&aКуплено по обычной цене."
  }
  denyActions: ${denyNoMoney}
}

items: [
  ${borderBlack} { slot: "0-8" }
  ${borderBlack} { slot: "18-26" }

  # ========== Золотое яблоко - два варианта по правилу VIP ==========

  # VIP-вариант: со скидкой, виден только VIP-игрокам.
  {
    slot: 13
    material: GOLDEN_APPLE
    name: "&6Золотое яблоко &8(&aцена VIP&8)"
    lore: [
      "&7Премиальный фрукт."
      ""
      "&eЦена: &a$50 &m$100"
      "&8(скидка VIP 50%)"
      ""
      "&aКликните, чтобы купить"
    ]
    rules { permission: "abstractmenus.vip" }
    click: ${discountClick}
  }

  # Обычный вариант: полная цена, показывается всем остальным (без правил = всегда видим,
  # но VIP-вариант перекрывает его, когда правило VIP проходит).
  {
    slot: 13
    material: GOLDEN_APPLE
    name: "&6Золотое яблоко"
    lore: [
      "&7Премиальный фрукт."
      ""
      "&eЦена: &a$100"
      ""
      "&aКликните, чтобы купить"
      "&8Ранг VIP даёт скидку 50%."
    ]
    click: ${regularClick}
  }

  ${buttonClose} { slot: 22 }
]
